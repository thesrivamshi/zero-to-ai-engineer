<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zero to AI Engineer — An Interactive Course</title>
<style>
:root{
  --bg:#09090b; --bg2:#101014; --bg3:#18181d; --border:#26262c; --border2:#34343c;
  --text:#e7e7ea; --muted:#9b9ba4; --dim:#6b6b75;
  --accent:#7c6cf6; --accent2:#a78bfa; --green:#34d399; --amber:#fbbf24; --red:#f87171; --cyan:#22d3ee;
  --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font:16px/1.65 -apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:var(--accent2)}
code{font-family:var(--mono);font-size:.86em;background:var(--bg3);border:1px solid var(--border);padding:1px 5px;border-radius:5px;color:#c8c2ff}
pre{background:#0d0d11;border:1px solid var(--border);border-radius:10px;padding:14px 16px;overflow-x:auto;margin:14px 0;font-size:13.5px;line-height:1.55}
pre code{background:none;border:none;padding:0;color:#d6d3f0}
.app{display:flex;min-height:100vh}

/* ---------- sidebar ---------- */
.sidebar{width:300px;min-width:300px;background:var(--bg2);border-right:1px solid var(--border);height:100vh;overflow-y:auto;position:sticky;top:0;padding:18px 14px 40px;scrollbar-width:thin}
.logo{display:flex;align-items:center;gap:10px;padding:6px 8px 16px;cursor:pointer}
.logo .mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),#4f46e5);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff}
.logo .nm{font-weight:700;font-size:15px;line-height:1.25}
.logo .nm small{display:block;color:var(--dim);font-weight:500;font-size:11px}
.overall{margin:0 8px 14px;font-size:12px;color:var(--muted)}
.bar{height:6px;background:var(--bg3);border-radius:99px;overflow:hidden;margin-top:5px}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .4s}
.lvlhead{display:flex;align-items:center;gap:9px;width:100%;text-align:left;padding:9px 8px;border-radius:8px;font-size:13.5px;font-weight:600;color:var(--text)}
.lvlhead:hover{background:var(--bg3)}
.lvlhead .dot{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.lvlhead .pc{margin-left:auto;font-size:11px;color:var(--dim);font-weight:500}
.chap{margin:2px 0 6px 14px;border-left:1px solid var(--border);padding-left:8px}
.chapname{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);padding:7px 8px 3px;font-weight:700}
.lessonlink{display:flex;align-items:center;gap:8px;width:100%;text-align:left;padding:5px 8px;border-radius:7px;font-size:13px;color:var(--muted)}
.lessonlink:hover{background:var(--bg3);color:var(--text)}
.lessonlink.active{background:rgba(124,108,246,.14);color:var(--accent2)}
.lessonlink .st{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px}
.lessonlink.done .st{background:var(--green);border-color:var(--green);color:#052e1d}
.lessonlink.gate{color:var(--amber)}
.lessonlink.gate .st{border-color:var(--amber)}
.lessonlink.gate.done .st{background:var(--amber);border-color:var(--amber);color:#3b2503}

/* ---------- main ---------- */
.main{flex:1;min-width:0}
.topbar{display:none;position:sticky;top:0;z-index:30;background:rgba(9,9,11,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:10px 16px;align-items:center;gap:12px}
.content{max-width:780px;margin:0 auto;padding:42px 28px 110px}

/* home */
.hero{text-align:center;padding:30px 0 14px}
.hero h1{font-size:clamp(30px,5vw,46px);line-height:1.12;letter-spacing:-.02em;background:linear-gradient(90deg,#fff,var(--accent2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--muted);max-width:560px;margin:16px auto 0;font-size:17px}
.statrow{display:flex;gap:12px;justify-content:center;margin:26px 0 8px;flex-wrap:wrap}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 20px;text-align:center;min-width:110px}
.stat b{font-size:22px;display:block;color:var(--accent2)}
.stat span{font-size:12px;color:var(--dim)}
.levelcard{display:block;width:100%;text-align:left;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px 22px;margin:14px 0;transition:.15s}
.levelcard:hover{border-color:var(--accent);transform:translateY(-1px)}
.levelcard .top{display:flex;align-items:center;gap:12px}
.levelcard .dot{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.levelcard h3{font-size:17px}
.levelcard .sub{color:var(--muted);font-size:13.5px;margin-top:8px}
.levelcard .meta{display:flex;gap:14px;margin-top:12px;font-size:12px;color:var(--dim);align-items:center;flex-wrap:wrap}
.levelcard .bar{flex:1;min-width:120px;margin-top:0}

/* lesson */
.crumb{font-size:12.5px;color:var(--dim);margin-bottom:10px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.crumb b{color:var(--muted);font-weight:600}
h1.ltitle{font-size:29px;letter-spacing:-.015em;line-height:1.2;margin-bottom:6px}
.lmeta{color:var(--dim);font-size:13px;margin-bottom:26px}
.body h2{font-size:20px;margin:30px 0 10px;letter-spacing:-.01em}
.body h3{font-size:16.5px;margin:22px 0 8px}
.body p{margin:13px 0;color:#cfcfd6}
.body ul,.body ol{margin:13px 0 13px 24px;color:#cfcfd6}
.body li{margin:7px 0}
.body strong{color:#fff}
.body table{border-collapse:collapse;width:100%;margin:16px 0;font-size:14px}
.body th,.body td{border:1px solid var(--border);padding:8px 12px;text-align:left}
.body th{background:var(--bg2);color:var(--muted);font-size:12.5px;text-transform:uppercase;letter-spacing:.04em}
.callout{border:1px solid var(--border);border-left:3px solid var(--accent);background:var(--bg2);border-radius:0 10px 10px 0;padding:13px 16px;margin:18px 0;font-size:14.5px}
.callout.warn{border-left-color:var(--amber)}
.callout.fail{border-left-color:var(--red)}
.callout.tip{border-left-color:var(--green)}
.callout .ct{font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;color:var(--accent2)}
.callout.warn .ct{color:var(--amber)}.callout.fail .ct{color:var(--red)}.callout.tip .ct{color:var(--green)}
.gl{border-bottom:1px dashed var(--accent2);cursor:help;position:relative;color:#d8d2ff}
.gl:hover::after{content:attr(data-def);position:absolute;left:0;bottom:calc(100% + 6px);z-index:50;background:#1c1c24;border:1px solid var(--border2);color:var(--text);font-size:12.5px;line-height:1.5;padding:9px 12px;border-radius:9px;width:280px;box-shadow:0 8px 24px rgba(0,0,0,.5)}

/* sim */
.sim{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:18px;margin:24px 0}
.sim .simtitle{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--cyan);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.sim input[type=range]{width:100%;accent-color:var(--accent)}
.sim input[type=text],.sim textarea{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:9px 12px;font-size:14px;outline:none}
.sim input[type=text]:focus,.sim textarea:focus{border-color:var(--accent)}
.sim .row{display:flex;gap:12px;align-items:center;margin:10px 0;flex-wrap:wrap}
.sim .lbl{font-size:12.5px;color:var(--muted);min-width:120px}
.sim .val{font-family:var(--mono);font-size:12.5px;color:var(--accent2);min-width:46px;text-align:right}
.tok{display:inline-block;margin:2px;padding:2px 7px;border-radius:6px;font-family:var(--mono);font-size:13px}
.simout{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:12px;margin-top:10px;font-size:13.5px;min-height:44px}
.simbtn{background:var(--accent);color:#fff;font-weight:600;font-size:13px;padding:8px 16px;border-radius:8px}
.simbtn:hover{background:#6a5af0}
.simbtn.ghost{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}
.barrow{display:flex;align-items:center;gap:10px;margin:6px 0;font-size:12.5px}
.barrow .bl{width:130px;color:var(--muted);text-align:right;flex-shrink:0}
.barrow .bv{height:18px;border-radius:5px;background:var(--accent);min-width:2px;transition:width .3s}
.barrow .bn{font-family:var(--mono);font-size:11.5px;color:var(--dim)}

/* quiz */
.quiz{margin-top:40px;border:1px solid var(--border2);border-radius:14px;overflow:hidden}
.quiz .qhead{background:var(--bg2);padding:14px 18px;font-weight:700;font-size:14px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border)}
.qq{padding:16px 18px;border-bottom:1px solid var(--border)}
.qq:last-of-type{border-bottom:none}
.qq .qt{font-weight:600;font-size:15px;margin-bottom:10px}
.opt{display:flex;gap:10px;align-items:flex-start;padding:9px 12px;border:1px solid var(--border);border-radius:9px;margin:7px 0;cursor:pointer;font-size:14px;color:var(--muted);transition:.12s}
.opt:hover{border-color:var(--border2);color:var(--text)}
.opt.sel{border-color:var(--accent);background:rgba(124,108,246,.1);color:var(--text)}
.opt.right{border-color:var(--green);background:rgba(52,211,153,.1);color:var(--text)}
.opt.wrong{border-color:var(--red);background:rgba(248,113,113,.08)}
.opt .ob{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;margin-top:2px}
.opt.sel .ob{border-color:var(--accent);background:var(--accent)}
.opt.right .ob{border-color:var(--green);background:var(--green)}
.expl{font-size:13px;color:var(--muted);background:var(--bg2);border-radius:8px;padding:10px 12px;margin-top:8px;display:none}
.expl.show{display:block}
.qfoot{padding:14px 18px;display:flex;align-items:center;gap:14px;background:var(--bg2)}
.qmsg{font-size:13.5px;font-weight:600}
.qmsg.ok{color:var(--green)}.qmsg.no{color:var(--red)}

/* nav buttons */
.lessonnav{display:flex;gap:12px;margin-top:34px}
.navbtn{flex:1;border:1px solid var(--border);border-radius:12px;padding:13px 16px;text-align:left;transition:.13s}
.navbtn:hover{border-color:var(--accent)}
.navbtn small{display:block;font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.navbtn.next{text-align:right}
.navbtn span{font-size:14px;font-weight:600}
.navbtn:disabled{opacity:.35;cursor:default}
.navbtn:disabled:hover{border-color:var(--border)}

/* gate / checklist */
.gatecard{border:1px solid rgba(251,191,36,.4);background:rgba(251,191,36,.05);border-radius:14px;padding:20px;margin:22px 0}
.check{display:flex;gap:11px;align-items:flex-start;padding:10px 12px;border:1px solid var(--border);border-radius:10px;margin:8px 0;cursor:pointer;font-size:14px}
.check:hover{border-color:var(--border2)}
.check .cb{width:19px;height:19px;border-radius:6px;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;margin-top:1px}
.check.on{color:var(--muted)}
.check.on .cb{background:var(--green);border-color:var(--green);color:#052e1d}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:99px;border:1px solid var(--border2);color:var(--muted)}

/* glossary */
.glsearch{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;color:var(--text);padding:12px 15px;font-size:15px;outline:none;margin:16px 0}
.glitem{padding:13px 0;border-bottom:1px solid var(--border)}
.glitem b{color:var(--accent2)}
.glitem p{color:var(--muted);font-size:14px;margin-top:4px}

/* review */
.reviewbtn{display:flex;align-items:center;gap:8px;width:100%;text-align:left;padding:7px 8px;border-radius:7px;font-size:12.5px;color:var(--cyan);margin-top:2px}
.reviewbtn:hover{background:var(--bg3)}

/* ---------- terminal exercise ---------- */
.exo{border:1px solid var(--border2);border-radius:14px;margin:24px 0;overflow:hidden}
.exo .exhead{background:var(--bg2);padding:12px 16px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--amber);display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.exo .exhead.done{color:var(--green)}
.tasklist{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg2)}
.taskitem{display:flex;gap:9px;font-size:13px;color:var(--muted);padding:4px 0;align-items:flex-start}
.taskitem.cur{color:var(--text)}
.taskitem.tdone{color:var(--dim);text-decoration:line-through}
.taskitem .ti{width:16px;flex-shrink:0;color:var(--green)}
.termwin{background:#0a0a0e;padding:12px 14px;min-height:180px;max-height:320px;overflow-y:auto;font-family:var(--mono);font-size:13px;line-height:1.6;cursor:text}
.termwin .tline{white-space:pre-wrap;word-break:break-all}
.termwin .tps{color:var(--green)}
.termwin .terr{color:var(--red)}
.termwin .tout{color:#b8b8c4}
.termwin .thint{color:var(--amber)}
.terminrow{display:flex;align-items:center;background:#0a0a0e;padding:0 14px 12px;font-family:var(--mono);font-size:13px}
.terminrow .tps{color:var(--green);margin-right:8px;white-space:nowrap}
.terminrow input{flex:1;background:none;border:none;outline:none;color:var(--text);font:inherit}
/* ---------- python exercise ---------- */
.pyed{width:100%;background:#0a0a0e;border:none;border-bottom:1px solid var(--border);color:#d6d3f0;font-family:var(--mono);font-size:13px;line-height:1.6;padding:14px;min-height:170px;resize:vertical;outline:none;tab-size:4}
.pybar{display:flex;gap:10px;align-items:center;padding:10px 14px;background:var(--bg2)}
.pyout{background:#0a0a0e;border-top:1px solid var(--border);padding:12px 14px;font-family:var(--mono);font-size:12.5px;white-space:pre-wrap;color:#b8b8c4;min-height:30px;max-height:260px;overflow-y:auto}
.pyout .perr{color:var(--red)}
.pyout .pok{color:var(--green)}
/* ---------- playground ---------- */
.pg textarea{min-height:60px;resize:vertical;font-family:var(--mono);font-size:13px;margin:6px 0}
.pgout{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:12px;margin-top:10px;font-size:14px;white-space:pre-wrap;min-height:50px}
.pgmeta{font-size:11.5px;color:var(--dim);font-family:var(--mono);margin-top:6px}
.keywarn{border:1px solid rgba(251,191,36,.4);background:rgba(251,191,36,.06);border-radius:10px;padding:12px 14px;font-size:13.5px;margin:10px 0}
.keyinput{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:10px 12px;font-family:var(--mono);font-size:13px;outline:none;margin:8px 0}
@media(max-width:860px){
  .sidebar{position:fixed;left:0;top:0;z-index:40;transform:translateX(-100%);transition:transform .25s;width:290px}
  .sidebar.open{transform:none;box-shadow:0 0 60px rgba(0,0,0,.6)}
  .topbar{display:flex}
  .content{padding:26px 18px 90px}
}
</style>
</head>
<body>
<div class="app">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main">
    <div class="topbar">
      <button onclick="document.getElementById('sidebar').classList.toggle('open')" style="font-size:20px">☰</button>
      <b style="font-size:14px">Zero to AI Engineer</b>
      <a href="https://github.com/thesrivamshi/zero-to-ai-engineer" target="_blank" rel="noopener" title="Open source on GitHub — star it, fork it, deploy your own" aria-label="GitHub repository" style="margin-left:auto;display:inline-flex;align-items:center;gap:6px;color:var(--text);text-decoration:none;font-size:13px;opacity:.85">
        <svg height="20" width="20" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        <span style="display:none">GitHub</span>
      </a>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- floating focus timer + global notes -->
<button id="fabTimer" onclick="toggleTimer()" title="Focus timer" style="position:fixed;right:18px;bottom:74px;z-index:50;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:999px;padding:8px 12px;cursor:pointer;font-size:13px;box-shadow:0 4px 14px rgba(0,0,0,.25)">🍅 <span id="fabTimerLabel">25:00</span></button>
<button id="fabNotes" onclick="toggleNotes()" title="Notes" style="position:fixed;right:18px;bottom:22px;z-index:50;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:999px;padding:8px 14px;cursor:pointer;font-size:14px;box-shadow:0 4px 14px rgba(0,0,0,.25)">📝 Notes</button>
<div id="notesDrawer" style="display:none;position:fixed;right:18px;bottom:118px;z-index:51;width:min(390px,92vw);background:var(--bg3);border:1px solid var(--border);border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.35);padding:14px">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><b style="font-size:14px">📝 My notes</b><span style="font-size:11px;color:var(--muted)" id="notesSaved">autosaves</span></div>
  <textarea id="globalNotes" placeholder="Jot anything as you go — questions, ideas, things to revisit. Autosaves to this browser; open anytime with the 📝 button." style="width:100%;min-height:220px;resize:vertical;background:var(--bg2,#111);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px;font-size:13px;outline:none;font-family:inherit" oninput="saveGlobalNotes(this.value)"></textarea>
  <div style="font-size:11px;color:var(--muted);margin-top:6px">Global pad. Each lesson also has its own note box at the bottom. Both back up via Settings → Export progress.</div>
</div>
<div id="timerDrawer" style="display:none;position:fixed;right:18px;bottom:118px;z-index:51;width:min(300px,92vw);background:var(--bg3);border:1px solid var(--border);border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.35);padding:16px;text-align:center">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><b style="font-size:14px">🍅 Focus timer</b><span id="focusCount" style="font-size:11px;color:var(--muted)"></span></div>
  <div id="timerBig" style="font-size:46px;font-weight:700;letter-spacing:1px;margin:6px 0">25:00</div>
  <div id="timerMode" style="font-size:12px;color:var(--muted);margin-bottom:12px">Focus</div>
  <div style="display:flex;gap:8px;justify-content:center;margin-bottom:10px">
    <button class="simbtn" id="timerStart" onclick="timerToggle()">Start</button>
    <button class="simbtn ghost" onclick="timerReset()">Reset</button>
  </div>
  <div style="display:flex;gap:6px;justify-content:center">
    <button class="simbtn ghost" style="font-size:12px;padding:4px 9px" onclick="timerSet('focus')">Focus 25</button>
    <button class="simbtn ghost" style="font-size:12px;padding:4px 9px" onclick="timerSet('short')">Break 5</button>
    <button class="simbtn ghost" style="font-size:12px;padding:4px 9px" onclick="timerSet('long')">Long 15</button>
  </div>
  <div style="font-size:11px;color:var(--muted);margin-top:10px">Pomodoro: 25 min focus, then a 5 min break. Completed focus blocks are counted.</div>
</div>

<script src="data/glossary.js"></script>
<script src="data/level1.js"></script>
<script src="data/level2.js"></script>
<script src="data/level3.js"></script>
<script src="data/level4.js"></script>
<script src="data/level5.js"></script>
<script src="data/level6.js"></script>
<script src="data/reads.js"></script>
<script src="data/videos.js"></script>
<script src="data/diagrams.js"></script>
<script src="data/questions.js"></script>
<script>
/* ================= state ================= */
const LEVELS = window.COURSE_LEVELS || [];
const GLOSSARY = window.GLOSSARY || {};
const LKEY='z2ai_progress_v1';
let P = {}; try{ P = JSON.parse(localStorage.getItem(LKEY)||'{}'); }catch(e){ P={}; }
function save(){ localStorage.setItem(LKEY, JSON.stringify(P)); }
function isDone(id){ return !!P[id]; }
const COLORS=['#34d399','#22d3ee','#a78bfa','#fbbf24','#fb923c','#f87171'];

function allLessons(){ const out=[]; LEVELS.forEach((lv,li)=>{ lv.chapters.forEach(ch=>ch.lessons.forEach(l=>out.push({...l,_lv:li,_ch:ch.title}))); if(lv.project) out.push({...lv.project,_lv:li,_gate:true,_ch:'Project Gate'}); }); return out; }
function levelStats(lv,li){ let t=0,d=0; lv.chapters.forEach(ch=>ch.lessons.forEach(l=>{t++; if(isDone(l.id))d++;})); if(lv.project){t++; if(isDone(lv.project.id))d++;} return {t,d}; }

/* ================= glossary inline ================= */
function gloss(html){
  return html.replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g,(m,term,show)=>{
    const def=GLOSSARY[term.toLowerCase()];
    const txt=show||term;
    if(!def) return txt;
    return `<span class="gl" data-def="${def.replace(/"/g,'&quot;')}">${txt}</span>`;
  });
}

/* ================= router ================= */
function go(view,arg){ location.hash = view + (arg?'/'+arg:''); }
window.addEventListener('hashchange', render);
function render(){
  const h=location.hash.replace('#','');
  const [view,arg]=h.split('/');
  document.getElementById('sidebar').classList.remove('open');
  renderSidebar();
  const c=document.getElementById('content');
  if(view==='lesson') renderLesson(arg,c);
  else if(view==='gate') renderGate(arg,c);
  else if(view==='glossary') renderGlossary(c);
  else if(view==='settings') renderSettings(c);
  else if(view==='review') renderReview(parseInt(arg),c);
  else if(view==='books') renderBooks(c);
  else renderHome(c);
  window.scrollTo(0,0);
}

/* ================= sidebar ================= */
let openLevels = new Set([0]);
function renderSidebar(){
  const sb=document.getElementById('sidebar');
  const all=allLessons(); const total=all.length; const done=all.filter(l=>isDone(l.id)).length;
  const cur=(location.hash.match(/lesson\/([^/]+)/)||[])[1];
  let html=`<div class="logo" onclick="go('home')"><div class="mark">AI</div><div class="nm">Zero to AI Engineer<small>beginner → expert</small></div></div>
  <div class="overall">${done} / ${total} complete<div class="bar"><i style="width:${total?Math.round(done/total*100):0}%"></i></div></div>
  <input id="sbsearch" placeholder="🔍 Search lessons…" value="${searchTerm.replace(/"/g,'&quot;')}" oninput="setSearch(this.value)" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 10px;font-size:13px;outline:none;margin:0 0 10px">
  <div id="searchresults" style="display:none"></div><div id="sblist">`;
  LEVELS.forEach((lv,li)=>{
    const st=levelStats(lv,li); const open=openLevels.has(li); const col=COLORS[li%COLORS.length];
    html+=`<button class="lvlhead" onclick="toggleLevel(${li})"><span class="dot" style="background:${col}22;color:${col};border:1px solid ${col}55">${li+1}</span> ${lv.title}<span class="pc">${st.d}/${st.t}</span></button>`;
    if(open){
      lv.chapters.forEach(ch=>{
        html+=`<div class="chap"><div class="chapname">${ch.title}</div>`;
        ch.lessons.forEach(l=>{
          html+=`<button class="lessonlink ${isDone(l.id)?'done':''} ${cur===l.id?'active':''}" onclick="go('lesson','${l.id}')"><span class="st">${isDone(l.id)?'✓':''}</span><span>${l.t}</span></button>`;
        });
        html+='</div>';
      });
      if(lv.project){
        const pl=lv.project;
        html+=`<div class="chap"><div class="chapname">⛩ project gate</div><button class="lessonlink gate ${isDone(pl.id)?'done':''}" onclick="go('gate','${pl.id}')"><span class="st">${isDone(pl.id)?'✓':'★'}</span><span>${pl.t}</span></button>
        <button class="reviewbtn" onclick="go('review','${li}')">↻ Review checkpoint (Levels 1–${li+1})</button></div>`;
      }
    }
  });
  html+=`<button class="lvlhead" style="margin-top:10px" onclick="go('books')"><span class="dot" style="background:var(--bg3);color:var(--muted)">📚</span> Book progress <span class="pc">${bookPct()}%</span></button>`;
  html+=`<button class="lvlhead" onclick="go('glossary')"><span class="dot" style="background:var(--bg3);color:var(--muted)">📖</span> Glossary</button>`;
  html+=`<button class="lvlhead" onclick="go('settings')"><span class="dot" style="background:var(--bg3);color:var(--muted)">🔑</span> API key ${getKey()?'<span class="pc" style="color:var(--green)">connected</span>':'<span class="pc">not set</span>'}</button>`;
  html+='</div>';
  sb.innerHTML=html;
  if(searchTerm) renderSearchResults();
}
function toggleLevel(i){ openLevels.has(i)?openLevels.delete(i):openLevels.add(i); renderSidebar(); }

/* ================= home ================= */
function renderHome(c){
  const all=allLessons(); const done=all.filter(l=>isDone(l.id)).length;
  const quizCount=all.reduce((n,l)=>n+((l.quiz&&l.quiz.length)||0),0);
  let html=`<div class="hero"><h1>Zero to AI Engineer</h1>
  <p>An interactive course that takes you from "what is a token?" to designing inference systems at scale. Built on the ideas in <em>AI Engineering</em>, the <em>LLM Engineer's Handbook</em>, and <em>Inference Engineering</em> — with labs, projects, and quizzes. No background required. Expertise expected by the end.</p></div>
  <div class="statrow">
    <div class="stat"><b>${all.length}</b><span>lessons & gates</span></div>
    <div class="stat"><b>${quizCount}</b><span>quiz questions</span></div>
    <div class="stat"><b>${LEVELS.length}</b><span>levels</span></div>
    <div class="stat"><b>${done}</b><span>completed</span></div>
  </div>`;
  LEVELS.forEach((lv,li)=>{
    const st=levelStats(lv,li); const col=COLORS[li%COLORS.length];
    const first = lv.chapters[0].lessons[0];
    html+=`<button class="levelcard" onclick="openLevels.add(${li});go('lesson','${first.id}')">
      <div class="top"><span class="dot" style="background:${col}22;color:${col};border:1px solid ${col}55">${li+1}</span><h3>${lv.title}</h3></div>
      <div class="sub">${lv.sub}</div>
      <div class="meta"><span>${st.t} lessons</span><div class="bar"><i style="width:${st.t?Math.round(st.d/st.t*100):0}%;background:${col}"></i></div><span>${Math.round(st.d/st.t*100)||0}%</span></div>
    </button>`;
  });
  html+=`<div class="callout tip" style="margin-top:26px"><div class="ct">How to use this course</div>Go in order. Read each lesson, play with the interactive demos, pass the quiz, and do every lab on your own computer. Project gates at the end of each level are mandatory — they're where the real learning happens. Your progress is saved in this browser automatically.</div>`;
  c.innerHTML=html;
}

/* ================= lesson ================= */
function findLesson(id){
  const all=allLessons();
  const i=all.findIndex(l=>l.id===id);
  return {l:all[i], prev:all[i-1], next:all[i+1]};
}
function renderLesson(id,c){
  const {l,prev,next}=findLesson(id);
  if(!l){renderHome(c);return;}
  if(l._gate){renderGate(id,c);return;}
  const lv=LEVELS[l._lv];
  let html=`<div class="crumb"><b>Level ${l._lv+1}: ${lv.title}</b> · ${l._ch}</div>
  <h1 class="ltitle">${l.t}</h1><div class="lmeta">${l.lab?'🧪 Hands-on lab':'📘 Lesson'} · ~${l.min||4} min ${isDone(l.id)?' · <span style="color:var(--green)">✓ completed</span>':''}${l.src?` · <span title="Source coverage">📚 Goes deeper: ${srcLabel(l.src)}</span>`:''}</div>
  <div class="body">${gloss(l.body)}</div>`;
  if(window.DIAGRAMS&&DIAGRAMS[l.id]&&DIAGRAMS[l.id].length) html+=renderDiagrams(DIAGRAMS[l.id]);
  {const _vids=(l.videos||[]).concat((window.VIDEOS&&VIDEOS[l.id])||[]); if(_vids.length) html+=renderVideos(_vids);}
  if(window.READS&&READS[l.id]&&READS[l.id].length) html+=renderReads(READS[l.id],l.id);
  if(window.QUESTIONS&&QUESTIONS[l.id]&&QUESTIONS[l.id].length) html+=renderQuestions(QUESTIONS[l.id]);
  if(l.sim) simList(l.sim).forEach(s=>{html+=renderSim(s);});
  if(l.term) html+=renderTermEx(l);
  if(l.py) html+=renderPyEx(l);
  if(l.live) html+=renderLiveEx(l);
  if(l.evalrun) html+=renderEvalEx(l);
  if(l.colab) html+=renderColabEx(l);
  if(l.deploy) html+=renderDeployEx(l);
  if(l.quiz&&l.quiz.length) html+=renderQuiz(l);
  else if(!hasExercise(l)) html+=`<div style="margin-top:30px"><button class="simbtn" onclick="markDone('${l.id}')">${isDone(l.id)?'✓ Completed':'Mark as complete'}</button></div>`;
  html+=renderNotes(l);
  html+=navBtns(prev,next);
  c.innerHTML=html;
  if(l.sim) simList(l.sim).forEach(initSim);
  if(l.term) initTermEx(l);
  if(l.py) initPyEx(l);
  if(l.live) initLiveEx(l);
  if(l.evalrun) initEvalEx(l);
  if(l.colab) initColabEx(l);
  if(l.deploy) initDeployEx(l);
}
function simList(s){ return Array.isArray(s)?s:[s]; }
const BOOK_NAMES={AIE:'AI Engineering',LEH:"LLM Engineer's Handbook",INF:'Inference Engineering'};
function srcLabel(src){
  // "AIE ch.6 §RAG" -> "AI Engineering, Chapter 6 (RAG)"
  return String(src).split('+').map(part=>{
    const m=part.trim().match(/^(AIE|LEH|INF)\s*ch\.?\s*([\d–\-–.]+)\s*(?:§(.*))?$/i);
    if(!m) return part.trim();
    return BOOK_NAMES[m[1].toUpperCase()]+', Chapter '+m[2]+(m[3]?' ('+m[3].trim()+')':'');
  }).join(' · ');
}
function renderVideos(videos){
  return `<div class="callout tip" style="margin-top:22px"><div class="ct">🎬 Watch — optional, but gold</div><ul style="margin:6px 0 2px 18px">`+
    videos.map(v=>`<li style="margin:6px 0"><a href="${v.url}" target="_blank" rel="noopener">${v.title}</a>${v.why?` — <span style="color:var(--muted)">${v.why}</span>`:''}</li>`).join('')+
  `</ul></div>`;
}
function renderQuestions(arr){
  const lc={easy:'var(--green)',medium:'var(--amber)',hard:'var(--red)'};
  return `<div class="callout" style="margin-top:22px"><div class="ct">🎤 Test yourself — questions from the books</div><p style="font-size:13px;color:var(--muted);margin:2px 0 10px">Answer each one out loud (or in writing) first, then reveal. These are the deeper questions — the kind the book, or an interviewer, would press on.</p>`+
    arr.map(x=>`<details style="margin:8px 0;border:1px solid var(--border);border-radius:8px;padding:9px 12px">
      <summary style="cursor:pointer;font-weight:600;line-height:1.5">${x.level?`<span style="font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:${lc[String(x.level).toLowerCase()]||'var(--muted)'};margin-right:7px">${escapeHtml(String(x.level))}</span>`:''}${escapeHtml(x.q)}</summary>
      <div style="margin-top:9px;font-size:14px;line-height:1.6">${escapeHtml(x.a)}</div>
    </details>`).join('')+
  `</div>`;
}
function renderDiagrams(arr){
  return arr.map(d=>`<figure style="margin:20px 0;border:1px solid var(--border);border-radius:12px;padding:16px;background:var(--bg3)">
    <div style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)">📐 Visual${d.term?' · '+d.term:''}</div>
    ${d.title?`<div style="font-weight:700;margin:3px 0 12px">${d.title}</div>`:''}
    <div style="overflow-x:auto;background:#fdfdfb;border:1px solid var(--border);border-radius:8px;padding:14px">${d.svg}</div>
    ${d.caption?`<figcaption style="font-size:13px;color:var(--muted);margin-top:10px">${d.caption} <span style="opacity:.6">— original schematic (redrawn for clarity, not from the book)</span></figcaption>`:''}
  </figure>`).join('');
}
function renderReads(reads,lid){
  const n=reads.length, done=reads.filter((_,i)=>P['read_'+lid+'_'+i]).length;
  return `<div class="callout" style="margin-top:22px"><div class="ct">📖 Read deeper in the books — ${done}/${n} marked read</div><p style="font-size:13px;color:var(--muted);margin:2px 0 8px">The depth behind this lesson. Tick each one as you read it — across the whole course these references cover every chapter of all three books. Page numbers only; buy the books.</p><ul style="margin:6px 0 2px;list-style:none;padding-left:0">`+
    reads.map((r,i)=>{ const k='read_'+lid+'_'+i, d=!!P[k];
      return `<li style="margin:8px 0;display:flex;gap:9px;align-items:flex-start"><button onclick="toggleRead('${lid}',${i})" title="Mark as read" style="flex:0 0 auto;cursor:pointer;background:${d?'var(--green)':'transparent'};border:1px solid ${d?'var(--green)':'var(--border)'};color:${d?'#06240f':'var(--muted)'};border-radius:5px;width:22px;height:22px;font-size:13px;line-height:20px;padding:0">${d?'✓':''}</button><span style="${d?'opacity:.55':''}"><b>${BOOK_NAMES[r.b]||r.b}</b> — Ch.${r.c}${r.p?`, <span style="color:var(--green)">pp.${r.p}</span>`:''}${r.f?` <span style="color:var(--muted)">— ${r.f}</span>`:''}</span></li>`;
    }).join('')+
  `</ul><div style="margin-top:8px"><span onclick="go('books')" style="cursor:pointer;color:var(--muted);font-size:13px;text-decoration:underline">📚 See your progress across all three books →</span></div></div>`;
}
function toggleRead(id,i){ const k='read_'+id+'_'+i; if(P[k]) delete P[k]; else P[k]=true; save(); render(); }
function bookStats(){
  const s={AIE:{t:0,d:0,ch:{}},LEH:{t:0,d:0,ch:{}},INF:{t:0,d:0,ch:{}}}, R=window.READS||{};
  Object.keys(R).forEach(id=>R[id].forEach((r,i)=>{
    const b=s[r.b]; if(!b) return; const d=!!P['read_'+id+'_'+i];
    b.t++; if(d) b.d++;
    if(!b.ch[r.c]) b.ch[r.c]={t:0,d:0}; b.ch[r.c].t++; if(d) b.ch[r.c].d++;
  }));
  return s;
}
function bookPct(){ const s=bookStats(),o=['AIE','LEH','INF']; const t=o.reduce((a,b)=>a+s[b].t,0),d=o.reduce((a,b)=>a+s[b].d,0); return t?Math.round(d/t*100):0; }
function renderBooks(c){
  const s=bookStats(), order=['AIE','LEH','INF'];
  let html=`<h1 class="ltitle">📚 Your reading across the three books</h1>
  <div class="body"><p>Tick each <b>📖 Read deeper</b> reference inside its lesson as you read it. Finish them all and you've worked through every chapter of all three books — the goal you set. This tracks page references only; the books themselves you buy (nothing here reproduces their text).</p></div>`;
  order.forEach(b=>{
    const x=s[b], pct=x.t?Math.round(x.d/x.t*100):0, complete=x.t&&x.d===x.t;
    html+=`<div style="margin:18px 0;border:1px solid var(--border);border-radius:12px;padding:16px;background:var(--bg3)">
    <div style="display:flex;justify-content:space-between;align-items:baseline"><b style="font-size:16px">${complete?'✅ ':''}${BOOK_NAMES[b]}</b><span style="color:var(--muted)">${x.d}/${x.t} references · ${pct}%</span></div>
    <div class="bar" style="margin:9px 0 12px"><i style="width:${pct}%"></i></div>`;
    Object.keys(x.ch).sort((a,b2)=>parseFloat(a)-parseFloat(b2)).forEach(ck=>{
      const cc=x.ch[ck], cdone=cc.t&&cc.d===cc.t;
      html+=`<div style="font-size:13px;color:${cdone?'var(--green)':'var(--muted)'};margin:3px 0">${cdone?'✓':'•'} Ch.${ck} <span style="opacity:.7">(${cc.d}/${cc.t})</span></div>`;
    });
    html+=`</div>`;
  });
  const t=order.reduce((a,b)=>a+s[b].t,0), d=order.reduce((a,b)=>a+s[b].d,0), tp=t?Math.round(d/t*100):0;
  html+=`<div style="margin-top:12px;padding:14px 16px;border:1px solid var(--border);border-radius:12px;background:var(--bg2,var(--bg3))"><b style="font-size:15px">Overall: ${d}/${t} references read — ${tp}%</b><div class="bar" style="margin-top:8px"><i style="width:${tp}%"></i></div></div>`;
  c.innerHTML=html;
}
function hasExercise(l){ return !!(l.term||l.py||l.live||l.evalrun||l.colab||l.deploy); }
function exDone(id){ return !!P[id+'_ex']; }
function navBtns(prev,next){
  return `<div class="lessonnav">
    <button class="navbtn" ${prev?`onclick="go('${prev._gate?'gate':'lesson'}','${prev.id}')"`:'disabled'}><small>← Previous</small><span>${prev?prev.t:'—'}</span></button>
    <button class="navbtn next" ${next?`onclick="go('${next._gate?'gate':'lesson'}','${next.id}')"`:'disabled'}><small>Next →</small><span>${next?next.t:'Course complete!'}</span></button>
  </div>`;
}
function markDone(id){ P[id]=true; save(); render(); }

/* ================= quiz ================= */
let qSel={};
function renderQuiz(l){
  qSel={};
  let html=`<div class="quiz" id="quiz"><div class="qhead">✏️ Check your understanding <span style="color:var(--dim);font-weight:500;font-size:12px">— all correct to complete the lesson</span></div>`;
  l.quiz.forEach((q,qi)=>{
    html+=`<div class="qq" data-q="${qi}"><div class="qt">${qi+1}. ${q.q}</div>`;
    q.o.forEach((o,oi)=>{
      html+=`<div class="opt" data-o="${oi}" onclick="pick(${qi},${oi},this)"><span class="ob"></span><span>${o}</span></div>`;
    });
    html+=`<div class="expl" id="ex${qi}">${q.e||''}</div></div>`;
  });
  html+=`<div class="qfoot"><button class="simbtn" onclick="grade('${l.id}')">Submit answers</button><span class="qmsg" id="qmsg"></span></div></div>`;
  return html;
}
function pick(qi,oi,el){
  qSel[qi]=oi;
  el.parentElement.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel','right','wrong'));
  el.classList.add('sel');
}
function grade(id){
  const {l}=findLesson(id);
  let allRight=true;
  l.quiz.forEach((q,qi)=>{
    const qq=document.querySelector(`.qq[data-q="${qi}"]`);
    const opts=qq.querySelectorAll('.opt');
    opts.forEach(o=>o.classList.remove('right','wrong'));
    const sel=qSel[qi];
    if(sel===undefined){allRight=false;return;}
    if(sel===q.a){opts[sel].classList.add('right');}
    else{opts[sel].classList.add('wrong');opts[q.a].classList.add('right');allRight=false;}
    document.getElementById('ex'+qi).classList.add('show');
  });
  const msg=document.getElementById('qmsg');
  if(allRight){
    if(hasExercise(l)&&!exDone(id)){ msg.textContent='Quiz correct — now finish the hands-on exercise above to complete the lesson'; msg.className='qmsg no'; P[id+'_quiz']=true; save(); return; }
    msg.textContent='✓ Passed — lesson complete'; msg.className='qmsg ok'; P[id]=true; save(); renderSidebar();
  }
  else { msg.textContent='Not quite — review the explanations and try again'; msg.className='qmsg no'; }
}
function maybeComplete(l){
  // called when an exercise finishes: complete lesson if quiz also passed (or no quiz)
  if(!l.quiz||!l.quiz.length||P[l.id+'_quiz']){ P[l.id]=true; }
  save(); renderSidebar();
}

/* ================= project gate ================= */
function renderGate(id,c){
  const all=allLessons(); const i=all.findIndex(l=>l.id===id); const g=all[i];
  if(!g){renderHome(c);return;}
  const prev=all[i-1],next=all[i+1];
  const ck=P[id+'_ck']||[];
  let html=`<div class="crumb"><b>Level ${g._lv+1} Project Gate</b></div>
  <h1 class="ltitle">⛩ ${g.t}</h1><div class="lmeta">Mandatory project — build it for real before moving on ${isDone(id)?' · <span style="color:var(--green)">✓ completed</span>':''}</div>
  <div class="body">${gloss(g.body)}</div>
  <div class="gatecard"><div style="font-weight:700;margin-bottom:10px">✅ Completion checklist — check each item only when it's true</div>`;
  g.checklist.forEach((item,ci)=>{
    const on=ck.includes(ci);
    html+=`<div class="check ${on?'on':''}" onclick="toggleCheck('${id}',${ci})"><span class="cb">${on?'✓':''}</span><span>${item}</span></div>`;
  });
  html+=`</div>`;
  if(g.evidence) html+=renderEvidence(g);
  if(g.verify) html+=renderCapstoneVerify(g);
  html+=navBtns(prev,next);
  c.innerHTML=html;
}
function renderEvidence(g){
  let html=`<div class="gatecard" style="border-color:var(--border2);background:var(--bg2)"><div style="font-weight:700;margin-bottom:6px">📋 Evidence log — record your real numbers (saved in this browser)</div>
  <div style="font-size:13px;color:var(--muted);margin-bottom:10px">A defense is only as good as its evidence. Fill these from your actual measurements; they persist with your progress and export.</div>`;
  g.evidence.forEach(f=>{
    const v=P[g.id+'_ev_'+f.key]||'';
    if(f.long) html+=`<div class="row" style="display:block"><span class="lbl" style="display:block;margin-bottom:4px">${f.label}</span><textarea class="keyinput" style="min-height:54px" oninput="saveEvidence('${g.id}','${f.key}',this.value)" placeholder="${(f.placeholder||'').replace(/"/g,'&quot;')}">${escapeHtml(v)}</textarea></div>`;
    else html+=`<div class="row" style="display:block"><span class="lbl" style="display:block;margin-bottom:4px">${f.label}</span><input class="keyinput" value="${escapeHtml(v)}" oninput="saveEvidence('${g.id}','${f.key}',this.value)" placeholder="${(f.placeholder||'').replace(/"/g,'&quot;')}"></div>`;
  });
  html+=`</div>`;
  return html;
}
function saveEvidence(id,key,v){ if(v)P[id+'_ev_'+key]=v; else delete P[id+'_ev_'+key]; save(); }
let curCapstone=null;
function renderCapstoneVerify(g){
  curCapstone=g;
  const proof=P[g.id+'_proof'];
  return `<div class="gatecard"><div style="font-weight:700;margin-bottom:6px">🌐 Live verification — point this at your deployed capstone endpoint</div>
  <div style="font-size:13px;color:var(--muted);margin-bottom:10px">The same checks a monitor would run: a health probe, a live question, and a mini-eval of ${(g.verify.cases||[]).length} cases against your real service. ${proof?`<span style="color:var(--green)">last verified: ${escapeHtml(String(proof.summary))} (${proof.at})</span>`:''}</div>
  <input class="keyinput" id="capurl" placeholder="https://your-capstone.onrender.com" value="${escapeHtml((proof&&proof.summary)||'')}">
  <div class="row" style="margin-top:8px"><button class="simbtn" id="capbtn" onclick="runCapstone()">Verify deployment + run mini-eval</button></div>
  <div class="simout" id="capout" style="display:none;margin-top:10px"></div></div>`;
}
async function runCapstone(){
  const g=curCapstone, out=document.getElementById('capout'), btn=document.getElementById('capbtn');
  const base=normalizeBaseUrl(document.getElementById('capurl').value);
  out.style.display='block';
  if(!base){ out.textContent='Paste your deployed capstone URL first.'; return; }
  btn.disabled=true;
  try{
    out.innerHTML='1 — GET <code>'+escapeHtml(base)+'/health</code> …';
    const hr=await fetch(base+'/health'); const hj=await hr.json().catch(()=>null);
    if(!hr.ok||!deployCheckHealth(hj)){ out.innerHTML='<span style="color:var(--red)">✗ /health did not return {"status":"ok"} (HTTP '+hr.status+'). Wake the service / check CORS, then retry.</span>'; btn.disabled=false; return; }
    let lines=['<span style="color:var(--green)">✓ /health ok</span>'];
    const cases=g.verify.cases||[];
    let pass=0;
    for(let i=0;i<cases.length;i++){
      out.innerHTML=lines.join('<br>')+`<br>running eval case ${i+1}/${cases.length}…`;
      const ar=await fetch(base+'/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:cases[i].q})});
      const aj=await ar.json().catch(()=>null);
      if(!ar.ok||!deployCheckAsk(aj)){ lines.push(`<span style="color:var(--red)">✗ case ${i+1}: /ask did not return {answer, sources} (HTTP ${ar.status})</span>`); continue; }
      const hit=cases[i].expect?new RegExp(cases[i].expect,'i').test(aj.answer):true;
      if(hit)pass++;
      lines.push(`${hit?'<span style="color:var(--green)">✓</span>':'<span style="color:var(--amber)">~</span>'} case ${i+1}: <b>${escapeHtml(cases[i].q.slice(0,50))}</b> → ${escapeHtml(String(aj.answer).slice(0,70))}`);
    }
    const acc=cases.length?pass/cases.length:1;
    lines.push(`<b>Mini-eval: ${pass}/${cases.length} matched (${Math.round(acc*100)}%)</b>`);
    out.innerHTML=lines.join('<br>');
    if(acc>=(g.verify.threshold||0.5)){
      out.innerHTML+='<br><span style="color:var(--green)">✓ Your capstone is live and answering correctly. Evidence captured.</span>';
      P[g.id+'_proof']={summary:base,at:new Date().toISOString().slice(0,10),acc:Math.round(acc*100)};
      save();
    } else out.innerHTML+='<br><span style="color:var(--amber)">Service is live but the mini-eval is below threshold — inspect the answers above and improve retrieval/generation.</span>';
  }catch(e){ out.innerHTML='<span style="color:var(--red)">✗ '+escapeHtml(e.message)+'</span><br><span style="color:var(--amber)">Common causes: service asleep (open the URL first), missing CORS, or /ask not implemented. </span>'; }
  btn.disabled=false;
}
function toggleCheck(id,ci){
  let ck=P[id+'_ck']||[];
  ck=ck.includes(ci)?ck.filter(x=>x!==ci):[...ck,ci];
  P[id+'_ck']=ck;
  const all=allLessons(); const g=all.find(l=>l.id===id);
  P[id]=ck.length===g.checklist.length;
  save(); render();
}

function gradeReview(){
  let right=0;
  window._review.forEach((q,qi)=>{
    const qq=document.querySelector(`.qq[data-q="${qi}"]`);
    const opts=qq.querySelectorAll('.opt');
    const sel=qSel[qi];
    if(sel===q.a){opts[sel].classList.add('right');right++;}

/* tokenizer: crude BPE-ish splitter for intuition */
SIMS.tokenizer=function(b){
  b.innerHTML=`<input type="text" id="tkin" value="The unbelievable transformer architecture tokenizes everything!" oninput="SIMS._tok()">
  <div class="simout" id="tkout"></div><div style="font-size:12px;color:var(--dim);margin-top:8px" id="tkn"></div>`;
  SIMS._tok=function(){
    const v=document.getElementById('tkin').value;
    const parts=[];
    v.split(/(\s+)/).forEach(w=>{
      if(/^\s+$/.test(w)||w==='')return;
      if(w.length<=4){parts.push(w);return;}
      let rest=w;
      const common=['ing','tion','ed','er','es','ly','un','re','ble','ize','iz','arch','itect','ure','trans','form','token','every','thing','believ'];
      let out=[];
      while(rest.length>4){
        let cut=false;
        for(const c of common){ if(rest.toLowerCase().startsWith(c)&&rest.length-c.length>=2){out.push(rest.slice(0,c.length));rest=rest.slice(c.length);cut=true;break;} }
        if(!cut){out.push(rest.slice(0,4));rest=rest.slice(4);}
      }
      if(rest)out.push(rest);
      parts.push(...out);
    });
    const cols=['#7c6cf6','#22d3ee','#34d399','#fbbf24','#fb923c','#f87171','#a78bfa'];
    document.getElementById('tkout').innerHTML=parts.map((p,i)=>`<span class="tok" style="background:${cols[i%cols.length]}26;color:${cols[i%cols.length]};border:1px solid ${cols[i%cols.length]}44">${p}</span>`).join('');
    document.getElementById('tkn').textContent=`≈ ${parts.length} tokens (real tokenizers differ, but this is the idea: common pieces become single tokens; rare words get split)`;
  };
  SIMS._tok();
};

/* temperature sampling over toy distribution */
SIMS.temperature=function(b){
  b.innerHTML=`<p style="font-size:13.5px;color:var(--muted)">Prompt: <i>“The capital of France is”</i> — the model's raw preferences for the next token:</p>
  <div class="row"><span class="lbl">Temperature</span><input type="range" id="tmp" min="0" max="200" value="70" oninput="SIMS._temp()"><span class="val" id="tmpv">0.7</span></div>
  <div id="tmpbars"></div>
  <div class="row" style="margin-top:12px"><button class="simbtn" onclick="SIMS._tsample()">Sample next token 20×</button><span id="tsout" style="font-family:var(--mono);font-size:12.5px;color:var(--muted)"></span></div>`;
  const logits=[['Paris',8],['the',4.5],['a',4],['located',3.4],['beautiful',2.8],['Lyon',2.2]];
  SIMS._tprobs=function(){
    const t=Math.max(parseInt(document.getElementById('tmp').value)/100,0.01);
    const exps=logits.map(([w,l])=>Math.exp(l/t));
    const s=exps.reduce((a,b)=>a+b,0);
    return logits.map(([w],i)=>[w,exps[i]/s]);
  };
  SIMS._temp=function(){
    const t=parseInt(document.getElementById('tmp').value)/100;
    document.getElementById('tmpv').textContent=t.toFixed(2);
    const probs=SIMS._tprobs();
    document.getElementById('tmpbars').innerHTML=probs.map(([w,p])=>`<div class="barrow"><span class="bl">${w}</span><div class="bv" style="width:${Math.max(p*420,2)}px"></div><span class="bn">${(p*100).toFixed(1)}%</span></div>`).join('');
  };
  SIMS._tsample=function(){
    const probs=SIMS._tprobs();
    let out=[];
    for(let i=0;i<20;i++){
      let r=Math.random(),acc=0,chosen=probs[0][0];
      for(const [w,p] of probs){acc+=p;if(r<=acc){chosen=w;break;}}
      out.push(chosen);
    }
    document.getElementById('tsout').textContent=out.join(' · ');
  };
  SIMS._temp();
};

/* samplers: temperature + top-k + top-p on one toy distribution */
SIMS.samplers=function(b){
  const logits=[['Paris',8.0],['the',4.6],['a',4.1],['located',3.5],['beautiful',2.9],['Lyon',2.3],['surrounded',1.7],['definitely',1.2]];
  b.innerHTML=`<p style="font-size:13.5px;color:var(--muted)">One distribution, three controls. Prompt: <i>"The capital of France is"</i>. Watch which tokens survive each filter.</p>
  <div class="row"><span class="lbl">Temperature</span><input type="range" id="sm_t" min="0" max="200" value="70" oninput="SIMS._sm()"><span class="val" id="sm_tv">0.70</span></div>
  <div class="row"><span class="lbl">top-k (0 = off)</span><input type="range" id="sm_k" min="0" max="8" value="0" oninput="SIMS._sm()"><span class="val" id="sm_kv">off</span></div>
  <div class="row"><span class="lbl">top-p (1 = off)</span><input type="range" id="sm_p" min="10" max="100" value="100" oninput="SIMS._sm()"><span class="val" id="sm_pv">1.00</span></div>
  <div id="sm_bars"></div>
  <div class="simout" id="sm_out" style="font-size:12.5px"></div>`;
  SIMS._sm=function(){
    const t=Math.max(+document.getElementById('sm_t').value/100,0.01);
    const k=+document.getElementById('sm_k').value;
    const p=+document.getElementById('sm_p').value/100;
    document.getElementById('sm_tv').textContent=t.toFixed(2);
    document.getElementById('sm_kv').textContent=k===0?'off':k;
    document.getElementById('sm_pv').textContent=p.toFixed(2);
    // softmax with temperature
    const exps=logits.map(([w,l])=>Math.exp(l/t));
    const s=exps.reduce((a,b)=>a+b,0);
    let dist=logits.map(([w],i)=>({w,p:exps[i]/s})).sort((a,b)=>b.p-a.p);
    // top-k: keep k highest
    let kept=new Set(dist.map(d=>d.w));
    if(k>0){ kept=new Set(dist.slice(0,k).map(d=>d.w)); }
    // top-p: keep smallest set whose cumulative prob >= p
    if(p<1){ let acc=0,pk=new Set(); for(const d of dist){ if(!kept.has(d.w))continue; pk.add(d.w); acc+=d.p; if(acc>=p)break; } kept=pk; }
    // renormalize kept
    const keptSum=dist.filter(d=>kept.has(d.w)).reduce((a,d)=>a+d.p,0)||1;
    document.getElementById('sm_bars').innerHTML=dist.map(d=>{
      const alive=kept.has(d.w);
      const shown=alive?d.p/keptSum:0;
      return `<div class="barrow"><span class="bl" style="color:${alive?'var(--text)':'var(--dim)'}">${d.w}</span><div class="bv" style="width:${Math.max((alive?shown:d.p)*360,2)}px;background:${alive?'var(--accent)':'var(--bg3)'};opacity:${alive?1:.5}"></div><span class="bn">${alive?(shown*100).toFixed(1)+'%':'cut'}</span></div>`;
    }).join('');
    const n=kept.size;
    document.getElementById('sm_out').innerHTML=`<b style="color:var(--accent2)">${n}</b> of ${dist.length} tokens can be chosen. Temperature reshapes the odds; top-k caps the count; top-p caps the cumulative mass. They stack — most apps tune temperature + one of top-k/top-p.`;
  };
  SIMS._sm();
};

/* embeddings: 2D toy map + cosine */
SIMS.embedding=function(b){
  const words={king:[8,8],queen:[7.6,8.4],man:[6,5],woman:[5.6,5.4],apple:[1,2],banana:[1.4,1.6],fruit:[1.8,2.4],paris:[4,9],france:[4.5,9.3],tokyo:[3.5,8.6]};
  b.innerHTML=`<div class="row"><span class="lbl">Word A</span><select id="ea" style="background:var(--bg);color:var(--text);border:1px solid var(--border2);border-radius:7px;padding:7px">${Object.keys(words).map(w=>`<option>${w}</option>`).join('')}</select>
  <span class="lbl" style="min-width:60px">Word B</span><select id="eb" style="background:var(--bg);color:var(--text);border:1px solid var(--border2);border-radius:7px;padding:7px">${Object.keys(words).map((w,i)=>`<option ${i===1?'selected':''}>${w}</option>`).join('')}</select></div>
  <div class="simout" id="eout"></div>
  <p style="font-size:12px;color:var(--dim);margin-top:8px">Real embeddings have 1,000+ dimensions, not 2 — but the principle is identical: similar meaning ⇒ vectors point the same way ⇒ high cosine similarity.</p>`;
  const upd=()=>{
    const a=words[document.getElementById('ea').value], c=words[document.getElementById('eb').value];
    const dot=a[0]*c[0]+a[1]*c[1];
    const cos=dot/(Math.hypot(...a)*Math.hypot(...c));
    const pct=Math.max((cos-0.5)/0.5,0)*100;
    document.getElementById('eout').innerHTML=`Vector A = [${a}]   Vector B = [${c}]<br>Cosine similarity = <b style="color:var(--accent2)">${cos.toFixed(3)}</b>
    <div class="bar" style="margin-top:8px"><i style="width:${pct}%"></i></div>
    <div style="margin-top:6px;font-size:13px;color:${cos>0.97?'var(--green)':cos>0.9?'var(--amber)':'var(--red)'}">${cos>0.97?'Very similar meaning':cos>0.9?'Somewhat related':'Different concepts'}</div>`;
  };
  document.getElementById('ea').onchange=upd; document.getElementById('eb').onchange=upd; upd();
};

/* chunking */
SIMS.chunking=function(b){
  const text="AI engineering is the discipline of building applications on top of foundation models. Unlike classical machine learning, you usually start from a model someone else trained. Your job is to adapt it: with prompts, with retrieved context, or with fine-tuning. Evaluation is the hardest part of the job. Without reliable evaluation, you cannot tell whether any change made your system better or worse. Retrieval-augmented generation grounds the model in your own documents. It splits documents into chunks, embeds them, and retrieves the most relevant ones at question time.";
  b.innerHTML=`<div class="row"><span class="lbl">Chunk size (chars)</span><input type="range" id="cs" min="40" max="300" value="120" oninput="SIMS._chunk()"><span class="val" id="csv">120</span></div><div class="simout" id="cout"></div>`;
  SIMS._chunk=function(){
    const n=parseInt(document.getElementById('cs').value);
    document.getElementById('csv').textContent=n;
    const cols=['#7c6cf6','#22d3ee','#34d399','#fbbf24','#fb923c','#f87171'];
    let chunks=[],i=0;
    while(i<text.length){
      let end=Math.min(i+n,text.length);
      if(end<text.length){const sp=text.lastIndexOf(' ',end); if(sp>i)end=sp;}
      chunks.push(text.slice(i,end)); i=end+1;
    }
    document.getElementById('cout').innerHTML=chunks.map((c,ci)=>`<span style="background:${cols[ci%cols.length]}1f;border-bottom:2px solid ${cols[ci%cols.length]};padding:1px 2px">${c}</span>`).join(' ')+`<div style="margin-top:10px;font-size:12.5px;color:var(--dim)">${chunks.length} chunks. Small chunks = precise retrieval but lost context. Big chunks = more context but diluted relevance.</div>`;
  };
  SIMS._chunk();
};

/* mini RAG retrieval */
SIMS.rag=function(b){
  const docs=[
    "Refund policy: customers may return any item within 30 days for a full refund.",
    "Shipping: standard delivery takes 3-5 business days within the country.",
    "Warranty: all electronics include a 2-year manufacturer warranty.",
    "Support hours: our help desk is open Monday to Friday, 9am to 6pm.",
    "Loyalty program: members earn 2 points per dollar spent on every purchase."
  ];

  <div class="simout" id="rout"></div>
  <p style="font-size:12px;color:var(--dim);margin-top:8px">This demo scores by word overlap. Real RAG uses embedding similarity — same idea, much smarter matching.</p>`;
  SIMS._rag=function(){
    const q=document.getElementById('rq').value.toLowerCase().split(/\W+/).filter(w=>w.length>2);
    const scored=docs.map(d=>{

  };
  SIMS._rag();
};

/* context window */
SIMS.context=function(b){
  b.innerHTML=`<div class="row"><span class="lbl">Conversation length (messages)</span><input type="range" id="cw" min="2" max="60" value="10" oninput="SIMS._cw()"><span class="val" id="cwv"></span></div><div class="simout" id="cwout"></div>`;
  SIMS._cw=function(){
    const n=+document.getElementById('cw').value;
    document.getElementById('cwv').textContent=n;
    const tokens=n*350, win=8000;
    const over=tokens>win;
    let html=`<div style="font-size:13px">≈ ${tokens.toLocaleString()} tokens of history · window = ${win.toLocaleString()} tokens</div><div class="bar" style="margin-top:8px;height:14px"><i style="width:${Math.min(tokens/win*100,100)}%;background:${over?'var(--red)':'var(--accent)'}"></i></div>`;
    html+=`<div style="margin-top:8px;font-size:12.5px;color:${over?'var(--red)':'var(--dim)'}">${over?`Overflow! The oldest ${Math.ceil((tokens-win)/350)} messages get cut off — the model literally cannot see them anymore. This is why chatbots "forget".`:'Everything still fits — the model can see the whole conversation.'}</div>`;
    document.getElementById('cwout').innerHTML=html;
  };
  SIMS._cw();
};

/* quantization */
SIMS.quant=function(b){
  b.innerHTML=`<div class="row"><span class="lbl">Precision</span><select id="qp" onchange="SIMS._q()" style="background:var(--bg);color:var(--text);border:1px solid var(--border2);border-radius:7px;padding:7px">
  <option value="16">FP16 — 16 bits/weight</option><option value="8">INT8 — 8 bits/weight</option><option value="4" selected>INT4 — 4 bits/weight</option><option value="2">2-bit (extreme)</option></select>
  <span class="lbl" style="min-width:80px">Model size</span><select id="qm" onchange="SIMS._q()" style="background:var(--bg);color:var(--text);border:1px solid var(--border2);border-radius:7px;padding:7px"><option value="7">7B params</option><option value="70">70B params</option><option value="405">405B params</option></select></div>
  <div class="simout" id="qout"></div>`;
  SIMS._q=function(){
    const bits=+document.getElementById('qp').value, p=+document.getElementById('qm').value;
    const gb=p*bits/8;
    const qual={16:'~100% (reference quality)',8:'~99% — nearly free win',4:'~97-98% — the sweet spot for most uses',2:'~80-90% — noticeable damage, niche only'}[bits];
    const fits=gb<=24?'fits on one consumer GPU (24 GB)':gb<=80?'needs one datacenter GPU (80 GB)':`needs ${Math.ceil(gb/80)} × 80 GB GPUs`;
    document.getElementById('qout').innerHTML=`Memory for weights: <b style="color:var(--accent2)">${gb.toFixed(1)} GB</b> → ${fits}<br>Typical quality retained: <b style="color:${bits>=4?'var(--green)':'var(--red)'}">${qual}</b><div style="font-size:12.5px;color:var(--dim);margin-top:6px">Lower precision also means fewer bytes to move from memory → faster decoding, since LLM decoding is memory-bandwidth-bound.</div>`;
  };
  SIMS._q();
};

/* batching */
SIMS.batching=function(b){
  b.innerHTML=`<div class="row"><span class="lbl">Batch size</span><input type="range" id="bs" min="1" max="64" value="8" oninput="SIMS._b()"><span class="val" id="bsv"></span></div><div class="simout" id="bout"></div>`;
  SIMS._b=function(){
    const n=+document.getElementById('bs').value;
    document.getElementById('bsv').textContent=n;
    const thr=Math.round(40*n/(1+n*0.02));
    const lat=Math.round(25*(1+n*0.02));
    document.getElementById('bout').innerHTML=
    `<div class="barrow"><span class="bl">Throughput</span><div class="bv" style="width:${thr/2200*420}px;background:var(--green)"></div><span class="bn">${thr.toLocaleString()} tok/s total</span></div>
    <div class="barrow"><span class="bl">Per-token latency</span><div class="bv" style="width:${lat*4}px;background:var(--amber)"></div><span class="bn">${lat} ms/token per user</span></div>
    <div style="margin-top:8px;font-size:12.5px;color:var(--dim)">Batching reuses one weight-load from memory across many users — throughput scales almost linearly while each user's latency degrades only slightly. This is THE core economics of inference serving.</div>`;
  };
  SIMS._b();
};

/* KV cache */
SIMS.kvcache=function(b){
  b.innerHTML=`<div class="row"><span class="lbl">Tokens generated so far</span><input type="range" id="kv" min="10" max="2000" value="300" oninput="SIMS._kv()"><span class="val" id="kvv"></span></div><div class="simout" id="kvout"></div>`;
  SIMS._kv=function(){
    const n=+document.getElementById('kv').value;
    document.getElementById('kvv').textContent=n;
    const naive=n*(n+1)/2, cached=n;
    document.getElementById('kvout').innerHTML=
    `<div class="barrow"><span class="bl">Without KV cache</span><div class="bv" style="width:${Math.min(naive/2001000*420,420)}px;background:var(--red)"></div><span class="bn">${naive.toLocaleString()} token-computations</span></div>
    <div class="barrow"><span class="bl">With KV cache</span><div class="bv" style="width:${Math.max(cached/2001000*420,2)}px;background:var(--green)"></div><span class="bn">${cached.toLocaleString()}</span></div>
    <div style="margin-top:8px;font-size:12.5px;color:var(--dim)">Without caching, every new token would recompute attention over ALL previous tokens from scratch (quadratic). The KV cache stores past keys/values so each new token costs one step. Price: the cache eats GPU memory — and managing that memory is half of inference engineering.</div>`;
  };
  SIMS._kv();
};

/* speculative decoding */
SIMS.speculative=function(b){
  b.innerHTML=`<div class="row"><span class="lbl">Draft acceptance rate</span><input type="range" id="sp" min="10" max="95" value="70" oninput="SIMS._sp()"><span class="val" id="spv"></span></div><div class="simout" id="spout"></div>`;
  SIMS._sp=function(){
    const a=+document.getElementById('sp').value/100;
    document.getElementById('spv').textContent=Math.round(a*100)+'%';
    const k=4;
    const accepted=(1-Math.pow(a,k+1))/(1-a);
    const speed=accepted/(1+k*0.15);
    document.getElementById('spout').innerHTML=`Drafting ${k} tokens per round with a small model, verifying with the big one:<br>Expected tokens accepted per big-model pass: <b style="color:var(--accent2)">${accepted.toFixed(2)}</b><br>Effective speedup: <b style="color:${speed>1.3?'var(--green)':'var(--amber)'}">${speed.toFixed(2)}×</b><div style="font-size:12.5px;color:var(--dim);margin-top:6px">When the draft model guesses well (predictable text, code), speculation flies. When acceptance drops, you pay for drafting and get nothing — speculation can even slow you down.</div>`;
  };
  SIMS._sp();
};

/* attention toy */
SIMS.attention=function(b){
  const sent=['The','cat','sat','on','the','mat','because','it','was','soft'];
  const att={7:[[1,0.62],[5,0.23],[9,0.08]],9:[[5,0.55],[1,0.2],[8,0.1]],2:[[1,0.7],[0,0.15]]};
  b.innerHTML=`<p style="font-size:13px;color:var(--muted)">Click a word to see what it "attends to" (toy weights):</p><div id="atw" style="line-height:2.4"></div><div class="simout" id="atout">Click <b>it</b> — what does the model think "it" refers to?</div>`;
  const draw=(sel)=>{
    document.getElementById('atw').innerHTML=sent.map((w,i)=>{
      let bg='var(--bg3)',col='var(--muted)';
      if(i===sel){bg='var(--accent)';col='#fff';}
      else if(sel!==undefined&&att[sel]){const f=att[sel].find(x=>x[0]===i); if(f){bg=`rgba(34,211,238,${f[1]})`;col='#fff';}}
      return `<span class="tok" style="background:${bg};color:${col};cursor:pointer;padding:4px 10px" onclick="SIMS._at(${i})">${w}</span>`;
    }).join('');
  };
  SIMS._at=function(i){
    draw(i);
    const a=att[i];
    document.getElementById('atout').innerHTML=a?`<b>"${sent[i]}"</b> attends most to: ${a.map(([j,w])=>`<b style="color:var(--cyan)">${sent[j]}</b> (${Math.round(w*100)}%)`).join(', ')} — attention is how the model resolves references and relationships between tokens.`:`<b>"${sent[i]}"</b> — this toy demo only has interesting weights for <b>it</b>, <b>sat</b> and <b>soft</b>. Try those!`;
  };
  draw();
};

async function llm(messages,opts={}){
  const k=getKey(); if(!k) throw new Error('No API key set — add one under 🔑 API key in the sidebar.');
  const body={model:opts.model||getChatModel(),messages,temperature:opts.temperature??0.7};
  if(opts.max_tokens)body.max_tokens=opts.max_tokens;
  if(opts.response_format)body.response_format=opts.response_format;
  const res=await fetch(getBase()+'/chat/completions',{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+k},
    body:JSON.stringify(body)});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error('API error '+res.status+': '+(e.error&&e.error.message||res.statusText));}
  const j=await res.json();
  return {text:j.choices[0].message.content,usage:j.usage};
}
function costOf(usage,model){
  const p=model==='gpt-4o'?[2.5,10]:[0.15,0.6];
  return (usage.prompt_tokens*p[0]+usage.completion_tokens*p[1])/1e6;
}
async function embedText(texts,opts={}){
  const k=getKey(); if(!k) throw new Error('No API key set — add one under 🔑 API key in the sidebar.');
  const res=await fetch(getBase()+'/embeddings',{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+k},
    body:JSON.stringify({model:opts.model||getEmbedModel(),input:texts})});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error('API error '+res.status+': '+(e.error&&e.error.message||res.statusText));}
  const j=await res.json();
  return {vectors:j.data.map(d=>d.embedding),usage:j.usage};
}
function cosineSim(a,b){
  let dot=0,na=0,nb=0;
  for(let i=0;i<a.length;i++){ dot+=a[i]*b[i]; na+=a[i]*a[i]; nb+=b[i]*b[i]; }
  return dot/(Math.sqrt(na)*Math.sqrt(nb)||1);
}

/* ================= streaming LLM call ================= */
function parseSSE(buf){
  // pure: split an SSE text buffer into complete data events + leftover
  const lines=buf.split('\n'); const rest=lines.pop();
  const events=[];
  for(const line of lines){
    const m=line.match(/^data: ?(.*)$/);
    if(m && m[1]!=='[DONE]') events.push(m[1]);
  }
  return {events, rest};
}
async function llmStream(messages,opts={},onToken){
  const k=getKey(); if(!k) throw new Error('No API key set — add one under 🔑 API key in the sidebar.');
  const body={model:opts.model||getChatModel(),messages,temperature:opts.temperature??0.7,stream:true,stream_options:{include_usage:true}};
  if(opts.max_tokens)body.max_tokens=opts.max_tokens;
  const res=await fetch(getBase()+'/chat/completions',{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+k},
    body:JSON.stringify(body)});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error('API error '+res.status+': '+(e.error&&e.error.message||res.statusText));}
  const reader=res.body.getReader(); const dec=new TextDecoder();
  let buf='', full='', usage=null;
  while(true){
    const {done,value}=await reader.read(); if(done)break;
    buf+=dec.decode(value,{stream:true});
    const {events,rest}=parseSSE(buf); buf=rest;
    for(const ev of events){
      try{
        const j=JSON.parse(ev);
        const d=j.choices&&j.choices[0]&&j.choices[0].delta&&j.choices[0].delta.content;
        if(d){ full+=d; if(onToken)onToken(d,full); }
        if(j.usage)usage=j.usage;
      }catch(e){}
    }
  }
  return {text:full,usage};
}

/* ================= pure validation helpers (unit-tested) ================= */
function extractJson(text){
  const m=text.match(/```(?:json)?\s*([\s\S]*?)```/);
  let t=(m?m[1]:text).trim();
  // tolerate prose around a single JSON object/array
  if(!/^[\[{]/.test(t)){ const s=t.search(/[\[{]/); if(s>=0){ const e=Math.max(t.lastIndexOf('}'),t.lastIndexOf(']')); if(e>s) t=t.slice(s,e+1); } }
  return t;
}
function liveCheck(chk,text){
  let parsed=null;
  if(chk.mustParse==='json'){
    try{ parsed=JSON.parse(extractJson(text)); }
    catch(e){ return {ok:false,why:'The response is not valid JSON. ('+e.message+')',parsed:null}; }
    if(chk.schemaKeys){ for(const key of chk.schemaKeys){ if(parsed===null||typeof parsed!=='object'||!(key in parsed)) return {ok:false,why:'The JSON is missing the required key "'+key+'".',parsed}; } }
  }
  if(chk.mustInclude){ for(const s of chk.mustInclude){ if(!text.toLowerCase().includes(String(s).toLowerCase())) return {ok:false,why:'The response must include: "'+s+'"',parsed}; } }
  if(chk.notInclude){ for(const s of chk.notInclude){ if(text.toLowerCase().includes(String(s).toLowerCase())) return {ok:false,why:'The response must NOT include: "'+s+'"',parsed}; } }
  if(chk.mustRegex&&!new RegExp(chk.mustRegex,'im').test(text)) return {ok:false,why:chk.failMsg||'The response does not match the required pattern yet.',parsed};
  if(chk.maxChars&&text.length>chk.maxChars) return {ok:false,why:'The response is too long ('+text.length+' chars, max '+chk.maxChars+'). Tighten your prompt.',parsed};
  return {ok:true,why:'',parsed};
}
function judgeMessages(rubric,response){
  return [
    {role:'system',content:'You are a strict grader. Grade the RESPONSE against the RUBRIC. Reply with ONLY a JSON object: {"pass": true|false, "reason": "one short sentence"}.'},
    {role:'user',content:'RUBRIC:\n'+rubric+'\n\nRESPONSE:\n'+response}
  ];
}
function judgeParse(text){
  try{ const j=JSON.parse(extractJson(text)); return {pass:j.pass===true,reason:String(j.reason||'')}; }
  catch(e){ return {pass:false,reason:'Judge reply was not valid JSON: '+text.slice(0,120)}; }
}
function applyTemplate(tpl,input){ return tpl.replace(/\{\{\s*input\s*\}\}/g,input); }
function evalMatch(expected,output,mode){
  const norm=s=>String(s).trim().toLowerCase().replace(/[.!?\s]+$/,'');
  if(mode==='includes') return norm(output).includes(norm(expected));
  if(mode==='regex') return new RegExp(expected,'i').test(output);
  return norm(output)===norm(expected);
}
function normalizeBaseUrl(u){
  u=String(u).trim().replace(/\/+$/,'');
  if(u&&!/^https?:\/\//i.test(u)) u='https://'+u;
  return u;
}
function deployCheckHealth(j){ return !!(j&&String(j.status).toLowerCase()==='ok'); }
function deployCheckAsk(j){ return !!(j&&typeof j.answer==='string'&&j.answer.length>0&&('sources' in j)); }
function colabParseScores(text,spec){
  let j;
  try{ j=JSON.parse(extractJson(text)); }
  catch(e){ return {ok:false,why:'That is not valid JSON. Copy the eval cell output exactly.',scores:null}; }
  for(const key of (spec.jsonKeys||[])){ if(!(key in j)) return {ok:false,why:'Missing key "'+key+'" — paste the full eval output.',scores:j}; }
  for(const key in (spec.plausible||{})){
    const v=Number(j[key]), [lo,hi]=spec.plausible[key];
    if(!(v>=lo&&v<=hi)) return {ok:false,why:'Value for "'+key+'" ('+j[key]+') is outside the plausible range ['+lo+', '+hi+']. Re-run the eval cell and paste its real output.',scores:j};
  }
  return {ok:true,why:'',scores:j};
}
function looksLikeFinetuneId(id){ return /^ft:[\w.-]+:/.test(String(id).trim()); }

  </div></div>`;

function initEvalEx(l){ curEval=l; }
async function runEval(){
  const l=curEval, ev=l.evalrun, btn=document.getElementById('evbtn'), casesEl=document.getElementById('evcases'), sum=document.getElementById('evsum'), meta=document.getElementById('evmeta');
  const tpl=document.getElementById('evtpl').value;
  if(!/\{\{\s*input\s*\}\}/.test(tpl)){ sum.style.display='block'; sum.innerHTML='<span style="color:var(--red)">Your template must contain {{input}} — that is where each test case gets inserted.</span>'; return; }
  btn.disabled=true; sum.style.display='none'; casesEl.innerHTML='';
  let right=0, cost=0;
  const rows=[];
  for(let i=0;i<ev.cases.length;i++){
    const c=ev.cases[i];
    casesEl.innerHTML=rows.join('')+`<div class="barrow"><span class="bn">case ${i+1}/${ev.cases.length} running…</span></div>`;
    try{
      const r=await llm([{role:'user',content:applyTemplate(tpl,c.input)}],{temperature:0,max_tokens:ev.maxTokens||60});
      if(r.usage)cost+=costOf(r.usage);
      const hit=evalMatch(c.expected,r.text,ev.match||'exact');
      if(hit)right++;
      rows.push(`<div class="barrow" style="align-items:flex-start"><span style="color:${hit?'var(--green)':'var(--red)'};width:18px;flex-shrink:0">${hit?'✓':'✗'}</span><span style="font-size:12.5px;color:var(--muted)"><b>${escapeHtml(c.input.slice(0,70))}</b> → got <code>${escapeHtml(r.text.trim().slice(0,60))}</code>${hit?'':' · wanted <code>'+escapeHtml(String(c.expected))+'</code>'}</span></div>`);
    }catch(e){
      rows.push(`<div class="barrow"><span style="color:var(--red)">✗ API error: ${escapeHtml(e.message)}</span></div>`);
      break;
    }
  }
  casesEl.innerHTML=rows.join('');
  const acc=right/ev.cases.length;
  meta.textContent=`total cost ~$${cost.toFixed(5)}`;
  sum.style.display='block';
  if(acc>=ev.threshold){
    sum.innerHTML=`<span style="color:var(--green)">✓ Accuracy ${right}/${ev.cases.length} = ${(acc*100).toFixed(0)}% — threshold beaten!</span>`;
    exComplete(l,'evalhead');
  }else{
    sum.innerHTML=`<span style="color:var(--red)">Accuracy ${right}/${ev.cases.length} = ${(acc*100).toFixed(0)}% — below the ${Math.round(ev.threshold*100)}% bar.</span> <span style="color:var(--amber)">Improve the prompt template and run again — that loop IS prompt engineering.</span>`;
  }
  btn.disabled=false;
}

function saveNote(id,v){ if(v)P[id+'_note']=v; else delete P[id+'_note']; save(); }

/* ================= progress export / import ================= */
function exportProgress(){
  const data={app:'zero-to-ai-engineer',version:1,exportedAt:new Date().toISOString(),progress:P};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='z2ai-progress-'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); URL.revokeObjectURL(a.href);
}
function importValidate(data){
  if(!data||typeof data!=='object') return {ok:false,why:'Not a JSON object.'};
  if(data.app!=='zero-to-ai-engineer'||!data.progress||typeof data.progress!=='object') return {ok:false,why:'This is not a Zero-to-AI-Engineer progress file.'};
  return {ok:true,why:''};
}
function importProgress(file){
  const rd=new FileReader();
  rd.onload=()=>{
    const out=document.getElementById('impout');
    try{
      const data=JSON.parse(rd.result);
      const v=importValidate(data);
      if(!v.ok){ out.innerHTML='<span style="color:var(--red)">✗ '+v.why+'</span>'; return; }
      P=data.progress; save(); renderSidebar();
      out.innerHTML='<span style="color:var(--green)">✓ Progress imported — '+Object.keys(P).filter(k=>P[k]===true).length+' completed items restored.</span>';
    }catch(e){ out.innerHTML='<span style="color:var(--red)">✗ Could not read that file: '+escapeHtml(e.message)+'</span>'; }
  };
  rd.readAsText(file);
}
