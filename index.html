<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zero to AI Engineer — An Interactive Course</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#ffffff; --bg2:#f7f6f3; --bg3:#efece5; --border:#e6e3db; --border2:#dad5ca;
  --paper:#fbfaf7; --ink:#14130f;
  --text:#14130f; --muted:#42403a; --dim:#8d887e;
  --accent:#7a1f1f; --accent2:#9a2b2b; --green:#3f7d4f; --amber:#9a6b1f; --red:#a3302a; --cyan:#2f6f7d;
  --sans:"Inter",system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --serif:"Fraunces",Georgia,'Times New Roman',serif;
  --mono:"IBM Plex Mono",ui-monospace,'SF Mono',Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{background:var(--bg);color:var(--text);font:16.5px/1.7 var(--sans)}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:var(--accent)}
em{font-style:italic;color:var(--accent)}
h1,h2,h3{font-family:var(--serif);font-weight:400;letter-spacing:-.015em}
code{font-family:var(--mono);font-size:.84em;background:var(--bg2);border:1px solid var(--border);padding:1px 5px;border-radius:4px;color:var(--accent)}
pre{background:var(--ink);border:1px solid #2c2b25;border-radius:6px;padding:14px 16px;overflow-x:auto;margin:14px 0;font-size:13.5px;line-height:1.55}
pre code{background:none;border:none;padding:0;color:#e9e5da}
.app{display:flex;min-height:100vh}

/* ---------- sidebar ---------- */
.sidebar{width:300px;min-width:300px;background:var(--paper);border-right:1px solid var(--border);height:100vh;overflow-y:auto;position:sticky;top:0;padding:18px 14px 40px;scrollbar-width:thin}
.logo{display:flex;align-items:center;gap:10px;padding:6px 8px 16px;cursor:pointer}
.logo .mark{width:34px;height:34px;border-radius:6px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;color:#f7f6f3;font-family:var(--serif)}
.logo .nm{font-weight:500;font-size:16px;line-height:1.25;font-family:var(--serif)}
.logo .nm small{display:block;color:var(--dim);font-weight:400;font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.16em;margin-top:2px}
.overall{margin:0 8px 14px;font-size:11px;color:var(--dim);font-family:var(--mono);letter-spacing:.04em}
.bar{height:5px;background:var(--bg3);border-radius:99px;overflow:hidden;margin-top:5px}
.bar i{display:block;height:100%;background:var(--accent);border-radius:99px;transition:width .4s}
.lvlhead{display:flex;align-items:center;gap:9px;width:100%;text-align:left;padding:9px 8px;border-radius:5px;font-size:13.5px;font-weight:500;color:var(--text)}
.lvlhead:hover{background:var(--bg3)}
.lvlhead .dot{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;font-family:var(--mono)}
.lvlhead .pc{margin-left:auto;font-size:10.5px;color:var(--dim);font-weight:400;font-family:var(--mono)}
.chap{margin:2px 0 6px 14px;border-left:1px solid var(--border);padding-left:8px}
.chapname{font-size:10px;text-transform:uppercase;letter-spacing:.16em;color:var(--dim);padding:7px 8px 3px;font-weight:500;font-family:var(--mono)}
.lessonlink{display:flex;align-items:center;gap:8px;width:100%;text-align:left;padding:5px 8px;border-radius:5px;font-size:13px;color:var(--muted)}
.lessonlink:hover{background:var(--bg3);color:var(--text)}
.lessonlink.active{background:rgba(122,31,31,.08);color:var(--accent);box-shadow:inset 2px 0 0 var(--accent)}
.lessonlink .st{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px}
.lessonlink.done .st{background:var(--green);border-color:var(--green);color:#fff}
.lessonlink.gate{color:var(--amber)}
.lessonlink.gate .st{border-color:var(--amber)}
.lessonlink.gate.done .st{background:var(--amber);border-color:var(--amber);color:#fff}

/* ---------- main ---------- */
.main{flex:1;min-width:0}
.topbar{display:none;position:sticky;top:0;z-index:30;background:rgba(255,255,255,.86);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:10px 16px;align-items:center;gap:12px}
.content{max-width:740px;margin:0 auto;padding:48px 28px 120px}

/* home */
.hero{text-align:center;padding:40px 0 18px}
.hero h1{font-family:var(--serif);font-weight:400;font-size:clamp(34px,5.4vw,58px);line-height:1.04;letter-spacing:-.02em;color:var(--ink)}
.hero p{color:var(--muted);max-width:560px;margin:20px auto 0;font-size:19px;line-height:1.6}
.statrow{display:flex;gap:0;justify-content:center;margin:30px 0 8px;flex-wrap:wrap;border:1px solid var(--border);border-radius:5px;overflow:hidden}
.stat{background:var(--bg);border-right:1px solid var(--border);padding:18px 26px;text-align:center;min-width:120px}
.stat:last-child{border-right:none}
.stat b{font-size:30px;display:block;color:var(--accent);font-family:var(--serif);font-weight:400;line-height:1}
.stat span{font-size:10px;color:var(--dim);font-family:var(--mono);text-transform:uppercase;letter-spacing:.12em;margin-top:8px;display:block}
.levelcard{display:block;width:100%;text-align:left;background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:24px 26px;margin:16px 0;transition:.15s;position:relative}
.levelcard:hover{border-color:var(--accent);transform:translateY(-1px)}
.levelcard .top{display:flex;align-items:center;gap:12px}
.levelcard .dot{width:34px;height:34px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:14px;flex-shrink:0;font-family:var(--mono)}
.levelcard h3{font-size:21px;font-family:var(--serif);font-weight:500}
.levelcard .sub{color:var(--muted);font-size:14.5px;margin-top:10px;line-height:1.6}
.levelcard .meta{display:flex;gap:14px;margin-top:14px;font-size:11px;color:var(--dim);align-items:center;flex-wrap:wrap;font-family:var(--mono);letter-spacing:.04em}
.levelcard .bar{flex:1;min-width:120px;margin-top:0}

/* lesson */
.crumb{font-size:11px;color:var(--dim);margin-bottom:14px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;font-family:var(--mono);text-transform:uppercase;letter-spacing:.12em}
.crumb b{color:var(--accent);font-weight:500}
h1.ltitle{font-family:var(--serif);font-weight:400;font-size:38px;letter-spacing:-.02em;line-height:1.08;margin-bottom:8px;color:var(--ink)}
.lmeta{color:var(--dim);font-size:11px;margin-bottom:30px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em}
.body h2{font-family:var(--serif);font-weight:500;font-size:27px;margin:40px 0 12px;letter-spacing:-.015em;line-height:1.15}
.body h3{font-family:var(--serif);font-weight:500;font-size:20px;margin:28px 0 8px}
.body p{margin:16px 0;color:var(--muted)}
.body ul,.body ol{margin:16px 0 16px 24px;color:var(--muted)}
.body li{margin:8px 0}
.body strong{color:var(--ink);font-weight:600}
.body table{border-collapse:collapse;width:100%;margin:18px 0;font-size:14px}
.body th,.body td{border:1px solid var(--border);padding:9px 13px;text-align:left}
.body th{background:var(--bg2);color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono)}
.callout{border:1px solid var(--border);border-left:2px solid var(--accent);background:var(--bg2);border-radius:0 5px 5px 0;padding:16px 18px;margin:20px 0;font-size:15px}
.callout.warn{border-left-color:var(--amber)}
.callout.fail{border-left-color:var(--red)}
.callout.tip{border-left-color:var(--green)}
.callout .ct{font-size:10.5px;font-weight:500;text-transform:uppercase;letter-spacing:.18em;margin-bottom:7px;color:var(--accent);font-family:var(--mono)}
.callout.warn .ct{color:var(--amber)}.callout.fail .ct{color:var(--red)}.callout.tip .ct{color:var(--green)}
/* collapsible repeated info note — collapsed to one line; expands on hover, click pins open (touch-friendly) */
.infonote{border:1px solid var(--border);border-left:2px solid var(--green);background:var(--bg2);border-radius:0 5px 5px 0;margin:18px 0;overflow:hidden}
.infonote .in-h{display:flex;align-items:center;gap:8px;cursor:pointer;padding:9px 14px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.14em;font-size:10.5px;color:var(--green);user-select:none}
.infonote .in-h .chev{margin-left:auto;transition:transform .3s ease;font-size:11px}
.infonote .in-h .hint{color:var(--dim);letter-spacing:.06em;text-transform:none;font-size:10px}
.infonote .in-b{max-height:0;opacity:0;overflow:hidden;transition:max-height .4s ease,opacity .3s ease,padding .3s ease;padding:0 14px;font-size:13px;line-height:1.6;color:var(--muted)}
.infonote:hover .in-b,.infonote.open .in-b{max-height:1000px;opacity:1;padding:2px 14px 13px}
.infonote:hover .chev,.infonote.open .chev{transform:rotate(180deg)}
.infonote .in-b strong{color:var(--ink);font-weight:600}
@media(prefers-reduced-motion:reduce){.infonote .in-b{transition:none}}
.gl{border-bottom:1px dashed var(--accent);cursor:help;position:relative;color:var(--accent)}
.gl:hover::after{content:attr(data-def);position:absolute;left:0;bottom:calc(100% + 6px);z-index:50;background:var(--ink);border:1px solid var(--ink);color:#f2efe9;font-size:12.5px;line-height:1.5;padding:9px 12px;border-radius:6px;width:280px;box-shadow:0 8px 24px rgba(20,19,15,.25)}

/* sim */
.sim{background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:20px;margin:26px 0}
.sim .simtitle{font-size:10.5px;font-weight:500;text-transform:uppercase;letter-spacing:.18em;color:var(--accent);margin-bottom:14px;display:flex;align-items:center;gap:7px;font-family:var(--mono)}
.sim input[type=range]{width:100%;accent-color:var(--accent)}
.sim input[type=text],.sim textarea{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:9px 12px;font-size:14px;outline:none}
.sim input[type=text]:focus,.sim textarea:focus{border-color:var(--accent)}
.sim .row{display:flex;gap:12px;align-items:center;margin:10px 0;flex-wrap:wrap}
.sim .lbl{font-size:12.5px;color:var(--muted);min-width:120px}
.sim .val{font-family:var(--mono);font-size:12.5px;color:var(--accent);min-width:46px;text-align:right}
.tok{display:inline-block;margin:2px;padding:2px 7px;border-radius:4px;font-family:var(--mono);font-size:13px}
.simout{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:12px;margin-top:10px;font-size:13.5px;min-height:44px}
.simbtn{background:var(--accent);color:#f7f6f3;font-weight:500;font-size:12px;padding:10px 18px;border-radius:4px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em}
.simbtn:hover{background:#5e1717}
.simbtn.ghost{background:transparent;color:var(--ink);border:1px solid var(--border2)}
.simbtn.ghost:hover{background:var(--bg3)}
.barrow{display:flex;align-items:center;gap:10px;margin:6px 0;font-size:12.5px}
.barrow .bl{width:130px;color:var(--muted);text-align:right;flex-shrink:0}
.barrow .bv{height:18px;border-radius:3px;background:var(--accent);min-width:2px;transition:width .3s}
.barrow .bn{font-family:var(--mono);font-size:11.5px;color:var(--dim)}

/* quiz */
.quiz{margin-top:44px;border:1px solid var(--border);border-radius:5px;overflow:hidden}
.quiz .qhead{background:var(--bg2);padding:14px 18px;font-weight:500;font-size:11px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border);font-family:var(--mono);text-transform:uppercase;letter-spacing:.16em;color:var(--accent)}
.qq{padding:18px;border-bottom:1px solid var(--border)}
.qq:last-of-type{border-bottom:none}
.qq .qt{font-weight:600;font-size:15px;margin-bottom:10px;color:var(--ink)}
.opt{display:flex;gap:10px;align-items:flex-start;padding:10px 13px;border:1px solid var(--border);border-radius:5px;margin:7px 0;cursor:pointer;font-size:14px;color:var(--muted);transition:.12s}
.opt:hover{border-color:var(--border2);color:var(--text)}
.opt.sel{border-color:var(--accent);background:rgba(122,31,31,.07);color:var(--text)}
.opt.right{border-color:var(--green);background:rgba(63,125,79,.1);color:var(--text)}
.opt.wrong{border-color:var(--red);background:rgba(163,48,42,.07)}
.opt .ob{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;margin-top:2px}
.opt.sel .ob{border-color:var(--accent);background:var(--accent)}
.opt.right .ob{border-color:var(--green);background:var(--green)}
.expl{font-size:13px;color:var(--muted);background:var(--bg2);border-radius:5px;padding:11px 13px;margin-top:8px;display:none}
.expl.show{display:block}
.qfoot{padding:14px 18px;display:flex;align-items:center;gap:14px;background:var(--bg2)}
.qmsg{font-size:13.5px;font-weight:600}
.qmsg.ok{color:var(--green)}.qmsg.no{color:var(--red)}

/* nav buttons */
.lessonnav{display:flex;gap:12px;margin-top:40px}
.navbtn{flex:1;border:1px solid var(--border);border-radius:5px;padding:14px 16px;text-align:left;transition:.13s}
.navbtn:hover{border-color:var(--accent)}
.navbtn small{display:block;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.14em;margin-bottom:4px;font-family:var(--mono)}
.navbtn.next{text-align:right}
.navbtn span{font-size:14.5px;font-weight:500;font-family:var(--serif)}
.navbtn:disabled{opacity:.35;cursor:default}
.navbtn:disabled:hover{border-color:var(--border)}

/* gate / checklist */
.gatecard{border:1px solid rgba(154,107,31,.45);background:rgba(154,107,31,.05);border-radius:5px;padding:22px;margin:24px 0}
.check{display:flex;gap:11px;align-items:flex-start;padding:11px 13px;border:1px solid var(--border);border-radius:5px;margin:8px 0;cursor:pointer;font-size:14px}
.check:hover{border-color:var(--border2)}
.check .cb{width:19px;height:19px;border-radius:5px;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;margin-top:1px}
.check.on{color:var(--muted)}
.check.on .cb{background:var(--green);border-color:var(--green);color:#fff}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:500;padding:4px 10px;border-radius:99px;border:1px solid var(--border2);color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em}

/* glossary */
.glsearch{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:12px 15px;font-size:15px;outline:none;margin:16px 0}
.glitem{padding:14px 0;border-bottom:1px solid var(--border)}
.glitem b{color:var(--accent);font-family:var(--serif);font-weight:500;font-size:17px}
.glitem p{color:var(--muted);font-size:14px;margin-top:5px}

/* review */
.reviewbtn{display:flex;align-items:center;gap:8px;width:100%;text-align:left;padding:7px 8px;border-radius:5px;font-size:12px;color:var(--accent);margin-top:2px}
.reviewbtn:hover{background:var(--bg3)}

/* ---------- terminal exercise ---------- */
.exo{border:1px solid var(--border);border-radius:5px;margin:26px 0;overflow:hidden}
.exo .exhead{background:var(--bg2);padding:13px 16px;font-size:10.5px;font-weight:500;text-transform:uppercase;letter-spacing:.18em;color:var(--amber);display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);font-family:var(--mono)}
.exo .exhead.done{color:var(--green)}
.tasklist{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg2)}
.taskitem{display:flex;gap:9px;font-size:13px;color:var(--muted);padding:4px 0;align-items:flex-start}
.taskitem.cur{color:var(--text)}
.taskitem.tdone{color:var(--dim);text-decoration:line-through}
.taskitem .ti{width:16px;flex-shrink:0;color:var(--green)}
.termwin{background:#0a0a0e;padding:12px 14px;min-height:180px;max-height:320px;overflow-y:auto;font-family:var(--mono);font-size:13px;line-height:1.6;cursor:text}
.termwin .tline{white-space:pre-wrap;word-break:break-all}
.termwin .tps{color:var(--green)}
.termwin .terr{color:var(--red)}
.termwin .tout{color:#b8b8c4}
.termwin .thint{color:var(--amber)}
.terminrow{display:flex;align-items:center;background:#0a0a0e;padding:0 14px 12px;font-family:var(--mono);font-size:13px}
.terminrow .tps{color:var(--green);margin-right:8px;white-space:nowrap}
.terminrow input{flex:1;background:none;border:none;outline:none;color:var(--text);font:inherit}
/* ---------- python exercise ---------- */
.pyed{width:100%;background:#0a0a0e;border:none;border-bottom:1px solid var(--border);color:#d6d3f0;font-family:var(--mono);font-size:13px;line-height:1.6;padding:14px;min-height:170px;resize:vertical;outline:none;tab-size:4}
.pybar{display:flex;gap:10px;align-items:center;padding:10px 14px;background:var(--bg2)}
.pyout{background:#0a0a0e;border-top:1px solid var(--border);padding:12px 14px;font-family:var(--mono);font-size:12.5px;white-space:pre-wrap;color:#b8b8c4;min-height:30px;max-height:260px;overflow-y:auto}
.pyout .perr{color:var(--red)}
.pyout .pok{color:var(--green)}
/* ---------- playground ---------- */
.pg textarea{min-height:60px;resize:vertical;font-family:var(--mono);font-size:13px;margin:6px 0}
.pgout{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:12px;margin-top:10px;font-size:14px;white-space:pre-wrap;min-height:50px}
.pgmeta{font-size:11.5px;color:var(--dim);font-family:var(--mono);margin-top:6px}
.keywarn{border:1px solid rgba(154,107,31,.4);background:rgba(154,107,31,.06);border-radius:5px;padding:12px 14px;font-size:13.5px;margin:10px 0}
.keyinput{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:10px 12px;font-family:var(--mono);font-size:13px;outline:none;margin:8px 0}
.keyinput:focus{border-color:var(--accent)}

/* ---------- lazy inline YouTube video players (click-to-load, responsive 16:9, in-app FS) ---------- */
/* 100% in-app only. Lazy click-to-load overlays. Responsive 16:9. Controls, playsinline=1, playlists via videoseries, timestamps via start.
   Titles + why notes ALWAYS kept visible inside the .yt-player container (visible in fullscreen too).
   Prominent in-app fullscreen using requestFullscreen DIRECTLY on the .yt-player container.
   NO primary external playback links whatsoever. Tiny secondary not used.
   Polished delightful UX: elegant card, hover lift, accent load state, premium playbtn, strong prominent FS, subtle delights. */
.vid{margin:14px 0 18px}
.vidmeta{font-size:14.5px;line-height:1.4;margin-bottom:6px}
.vidmeta b{font-weight:600;color:var(--ink)}
.vidnote{font-size:12px;color:var(--muted);font-style:italic;margin-top:2px}
.yt-player{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:6px;
  padding:14px 14px 10px;
  transition:box-shadow .2s ease, border-color .15s ease, transform .1s ease;
  box-shadow:0 4px 16px rgba(20,19,15,.06);
}
.yt-player:hover{box-shadow:0 10px 28px rgba(20,19,15,.12);border-color:var(--border2);transform:translateY(-1px)}
.yt-player.loaded{border-color:var(--accent);box-shadow:0 8px 24px rgba(122,31,31,.14)}
.yt-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#000;border:1px solid var(--border);border-radius:5px;overflow:hidden}
.yt-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0;border-radius:13px}
.yt-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(0,0,0,.35),rgba(0,0,0,.78));cursor:pointer;z-index:2;transition:background .1s}
.yt-overlay:hover{background:linear-gradient(180deg,rgba(0,0,0,.25),rgba(0,0,0,.72))}
.yt-overlay img{width:100%;height:100%;object-fit:cover;opacity:.92;display:block;filter:saturate(0.88) contrast(1.05);transition:transform .2s}
.yt-overlay:hover img{transform:scale(1.015)}
.yt-play{position:absolute;text-align:center;color:#fff;pointer-events:none;z-index:3}
.yt-playbtn{width:86px;height:58px;background:linear-gradient(135deg,#e11d48,#9f1239);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;line-height:1;margin:0 auto 8px;box-shadow:0 14px 32px rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.28);transition:transform .12s,box-shadow .12s}
.yt-overlay:hover .yt-playbtn{background:linear-gradient(135deg,#f43f5e,#be123c);transform:scale(1.06);box-shadow:0 18px 38px rgba(0,0,0,.7)}
.yt-play small{display:block;font-size:11px;letter-spacing:.5px;opacity:.9;margin-top:2px;font-weight:600}
.yt-controls{display:flex;align-items:center;justify-content:flex-start;gap:10px;margin-top:10px;flex-wrap:wrap}
.yt-fs{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#f7f6f3;border:0;border-radius:4px;padding:10px 20px;font-size:12px;font-weight:500;cursor:pointer;box-shadow:0 4px 12px rgba(122,31,31,.22);transition:all .12s ease;letter-spacing:.12em;text-transform:uppercase;font-family:var(--mono)}
.yt-fs:hover{background:#5e1717;transform:translateY(-2px);box-shadow:0 8px 18px rgba(122,31,31,.32)}
.yt-fs:active{transform:translateY(0)}
.yt-fs:focus{outline:3px solid rgba(122,31,31,.4);outline-offset:3px}
.yt-wrap .fs-float{position:absolute;top:10px;right:10px;z-index:4;background:rgba(15,15,18,.82);color:#fff;border:1px solid rgba(255,255,255,.38);border-radius:8px;padding:5px 10px;font-size:11.5px;font-weight:700;cursor:pointer;opacity:.92;transition:opacity .1s,background .1s,transform .1s}

}

<body>
<div class="app">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main">
    <div class="topbar">
      <button onclick="document.getElementById('sidebar').classList.toggle('open')" style="font-size:20px">☰</button>
      <b style="font-size:14px">Zero to AI Engineer</b>
      <button onclick="showAccount()" id="topbarAccount" title="Sign in / account & sync" style="margin-left:auto;display:inline-flex;align-items:center;gap:5px;font-size:12px;border:1px solid var(--border2);border-radius:99px;padding:5px 11px;color:var(--text)">☁️ <span id="topbarAcctLabel">Sign in</span></button>
      <a href="https://github.com/thesrivamshi/zero-to-ai-engineer" target="_blank" rel="noopener" title="Open source on GitHub — star it, fork it, deploy your own" aria-label="GitHub repository" style="margin-left:12px;display:inline-flex;align-items:center;gap:6px;color:var(--text);text-decoration:none;font-size:13px;opacity:.85">
        <svg height="20" width="20" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        <span style="display:none">GitHub</span>
      </a>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- floating focus timer + global notes + PROMINENT Share your Twin flows (enhanced for productization / community) -->
<button id="fabTimer" onclick="toggleTimer()" title="Focus timer" style="position:fixed;right:18px;bottom:74px;z-index:50;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:999px;padding:8px 12px;cursor:pointer;font-size:13px;box-shadow:0 4px 14px rgba(0,0,0,.25)">🍅 <span id="fabTimerLabel">25:00</span></button>
<button id="fabNotes" onclick="toggleNotes()" title="Notes" style="position:fixed;right:18px;bottom:22px;z-index:50;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:999px;padding:8px 14px;cursor:pointer;font-size:14px;box-shadow:0 4px 14px rgba(0,0,0,.25)">📝 Notes</button>
<!-- Floating share/Discord/fork CTAs removed for a cleaner, less distracting UI. Sharing still available from the sidebar (Share your Twin / Hall of Fame / Account). -->
<div id="notesDrawer" style="display:none;position:fixed;right:18px;bottom:118px;z-index:51;width:min(390px,92vw);background:var(--bg3);border:1px solid var(--border);border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.35);padding:14px">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><b style="font-size:14px">📝 My notes</b><span style="font-size:11px;color:var(--muted)" id="notesSaved">autosaves</span></div>
  <textarea id="globalNotes" placeholder="Jot anything as you go — questions, ideas, things to revisit. Autosaves to this browser; open anytime with the 📝 button." style="width:100%;min-height:220px;resize:vertical;background:var(--bg2,#111);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px;font-size:13px;outline:none;font-family:inherit" oninput="saveGlobalNotes(this.value)"></textarea>
  <div style="font-size:11px;color:var(--muted);margin-top:6px">Global pad. Each lesson also has its own note box at the bottom. Both back up via Settings → Export progress.</div>
</div>
<div id="timerDrawer" style="display:none;position:fixed;right:18px;bottom:118px;z-index:51;width:min(300px,92vw);background:var(--bg3);border:1px solid var(--border);border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.35);padding:16px;text-align:center">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><b style="font-size:14px">🍅 Focus timer</b><span id="focusCount" style="font-size:11px;color:var(--muted)"></span></div>
  <div id="timerBig" style="font-size:46px;font-weight:700;letter-spacing:1px;margin:6px 0">25:00</div>
  <div id="timerMode" style="font-size:12px;color:var(--muted);margin-bottom:12px">Focus</div>
  <div style="display:flex;gap:8px;justify-content:center;margin-bottom:10px">
    <button class="simbtn" id="timerStart" onclick="timerToggle()">Start</button>
    <button class="simbtn ghost" onclick="timerReset()">Reset</button>
  </div>
  <div style="display:flex;gap:6px;justify-content:center">
    <button class="simbtn ghost" style="font-size:12px;padding:4px 9px" onclick="timerSet('focus')">Focus 25</button>
    <button class="simbtn ghost" style="font-size:12px;padding:4px 9px" onclick="timerSet('short')">Break 5</button>
    <button class="simbtn ghost" style="font-size:12px;padding:4px 9px" onclick="timerSet('long')">Long 15</button>
  </div>
  <div style="font-size:11px;color:var(--muted);margin-top:10px">Pomodoro: 25 min focus, then a 5 min break. Completed focus blocks are counted.</div>
</div>

<script>
/* ================= state ================= */
const LEVELS = window.COURSE_LEVELS || [];
const GLOSSARY = window.GLOSSARY || {};
const LKEY='z2ai_progress_v1';
let P = {}; try{ P = JSON.parse(localStorage.getItem(LKEY)||'{}'); }catch(e){ P={}; }
function save(){ localStorage.setItem(LKEY, JSON.stringify(P)); if(typeof cloudQueuePush==='function') cloudQueuePush(); }
function isDone(id){ return !!P[id]; }
// Lightweight live AGENT state (for rich share snippets + twin config; persisted via P; fully client/static)
let AGENT = {}; try{ AGENT = JSON.parse(localStorage.getItem('z2ai_agent')||'{}'); }catch(e){ AGENT = {}; }
function saveAgent(){ localStorage.setItem('z2ai_agent', JSON.stringify(AGENT)); if(typeof cloudQueuePush==='function') cloudQueuePush(); }
function updateAgent(partial){ AGENT = {...AGENT, ...partial, updated: new Date().toISOString().slice(0,10)}; saveAgent(); }
// Thin award helper for Twin progress (used in gates/shares for mcpMultiAgent capstone evidence; delegates to existing streak/power)
function awardTwinProgress(id, extra){ if(id && !P[id]) P[id]=true; updateStreakOnComplete(); if(extra) updateAgent(extra); save(); renderSidebar(); }
const COLORS=['#34d399','#22d3ee','#a78bfa','#fbbf24','#fb923c','#f87171'];

/* ================= Cloud sync + Auth (Supabase) — OPTIONAL & additive.
   localStorage (P/AGENT) stays the offline source of truth; signing in just syncs it
   across devices, powers the live Hall of Fame leaderboard, and gives a public Twin page.
   The anon key below is a publishable client key (safe to ship); all data is guarded by RLS. */
const SB_URL = 'https://wxdwdfhoscegwnyhxitg.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4ZHdkZmhvc2NlZ3dueWh4aXRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMjAxMDEsImV4cCI6MjA5Nzg5NjEwMX0.1wpTTQuFOsuhFgMMDujzvYKhmoPY4nRA-juuEnPqV_g';
let sb=null, SB_USER=null, SB_PROFILE=null;
try{ if(window.supabase&&window.supabase.createClient) sb=window.supabase.createClient(SB_URL, SB_ANON); }catch(e){ sb=null; }
function cloudConfigured(){ return !!sb; }
function cloudEnabled(){ return !!(sb&&SB_USER); }
function accountChipHTML(){
  if(!cloudConfigured()) return '';
  if(cloudEnabled()){
    const em=(SB_USER&&SB_USER.email)||'account';
    return `<button onclick="showAccount()" title="Account & sync" style="display:flex;align-items:center;gap:9px;width:100%;text-align:left;margin:0 0 14px;padding:10px 11px;border:1px solid var(--border);border-radius:5px;background:var(--bg2)">
      <span style="width:24px;height:24px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0">✓</span>
      <span style="min-width:0;flex:1"><b style="display:block;font-weight:600;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(em)}</b><span style="color:var(--green);font-size:9.5px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.12em">Synced across devices</span></span></button>`;
  }
  return `<button onclick="showAccount()" title="Create a free account to sync your progress across devices, join the leaderboard, and get a shareable Twin page." style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin:0 0 14px;padding:11px;border:1px solid var(--accent);border-radius:5px;background:rgba(122,31,31,.05);color:var(--accent);font-size:11.5px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.12em">☁️ Sign in to sync</button>`;
}
function updateTopbarAccount(){
  const b=document.getElementById('topbarAccount'), l=document.getElementById('topbarAcctLabel');
  if(!b||!l) return;
  if(!cloudConfigured()){ b.style.display='none'; return; }
  b.style.display='inline-flex';
  if(cloudEnabled()){ const em=(SB_USER&&SB_USER.email)||''; l.textContent=em?em.split('@')[0]:'Account'; b.style.borderColor='var(--green)'; b.style.color='var(--green)'; }
  else { l.textContent='Sign in'; b.style.borderColor='var(--accent)'; b.style.color='var(--accent)'; }
}

function countLessonsDone(){ try{ return (allLessons()||[]).filter(l=>isDone(l.id)).length; }catch(e){ return Object.keys(P).filter(k=>P[k]===true).length; } }
function cloudMetrics(){ let s={}; try{ s=getTwinStatus()||{}; }catch(e){} const stages=(s.doneStages&&s.doneStages.length)||0; return { twin_progress_pct:Math.round((stages/3)*100), stages_done:stages, streak_days:(typeof getStreak==='function'?getStreak().count:0)||0, power:(typeof getTwinPower==='function'?getTwinPower():0)||0, lessons_done:countLessonsDone() }; }
function twinSnapshot(){ let s={}; try{ s=getTwinStatus()||{}; }catch(e){} return { badges:s.badges||[], stages:s.stages||{}, gates:s.gates||[], mcpReady:!!s.mcpReady, mcpTools:(s.agentState&&s.agentState.tools)||[], agent:AGENT||{}, metrics:cloudMetrics(), updated:new Date().toISOString().slice(0,10) }; }

let _cloudTimer=null;
function cloudQueuePush(){ if(!cloudEnabled())return; clearTimeout(_cloudTimer); _cloudTimer=setTimeout(cloudPush,1500); }
async function cloudPush(){ if(!cloudEnabled())return; try{
  await sb.from('progress').upsert(Object.assign({ user_id:SB_USER.id, p:P, agent:AGENT, gates:{ globalNotes: localStorage.getItem('z2ai_globalnotes')||'' }, updated_at:new Date().toISOString() }, cloudMetrics()));
  await sb.from('twin_profiles').update({ twin:twinSnapshot(), updated_at:new Date().toISOString() }).eq('user_id',SB_USER.id);
}catch(e){ console.warn('cloud push failed',e); } }

async function cloudPull(){ if(!cloudEnabled())return; try{
  const { data:prof } = await sb.from('profiles').select('*').eq('id',SB_USER.id).maybeSingle(); SB_PROFILE=prof||null;
  const { data } = await sb.from('progress').select('*').eq('user_id',SB_USER.id).maybeSingle();
  if(data){
    P = Object.assign({}, data.p||{}, P);          // union; local presence wins (booleans) — no progress lost
    AGENT = Object.assign({}, data.agent||{}, AGENT);
    const gn = data.gates && data.gates.globalNotes;
    if(gn && !localStorage.getItem('z2ai_globalnotes')) localStorage.setItem('z2ai_globalnotes', gn);
    localStorage.setItem(LKEY, JSON.stringify(P)); localStorage.setItem('z2ai_agent', JSON.stringify(AGENT));
  }
  await cloudPush();   // write the merged state straight back so cloud is current
  render();
}catch(e){ console.warn('cloud pull failed',e); } }

async function cloudInitAuth(){ if(!sb)return; try{
  const { data } = await sb.auth.getSession(); SB_USER = data&&data.session ? data.session.user : null;
  sb.auth.onAuthStateChange((_e, session)=>{ const was=SB_USER&&SB_USER.id; SB_USER = session?session.user:null; renderSidebar(); if(SB_USER && SB_USER.id!==was) cloudPull(); if(!SB_USER) SB_PROFILE=null; });
  if(SB_USER) cloudPull(); else renderSidebar();
}catch(e){ console.warn('auth init failed',e); } }

function _acctMsg(t,ok){ const m=document.getElementById('acctMsg'); if(m){ m.textContent=t; m.style.color=ok?'var(--green)':'var(--amber)'; } }
async function acctSignIn(){ const e=document.getElementById('acctEmail').value.trim(), p=document.getElementById('acctPw').value; if(!e||!p)return _acctMsg('Enter email + password.'); _acctMsg('Signing in…',true); const { error }=await sb.auth.signInWithPassword({ email:e, password:p }); if(error)return _acctMsg(error.message); _acctMsg('Signed in ✓',true); setTimeout(closeAccount,500); }
async function acctSignUp(){ const e=document.getElementById('acctEmail').value.trim(), p=document.getElementById('acctPw').value; if(!e||p.length<6)return _acctMsg('Email + password (min 6 chars).'); _acctMsg('Creating account…',true); const { data, error }=await sb.auth.signUp({ email:e, password:p }); if(error)return _acctMsg(error.message); if(data&&data.session){ _acctMsg('Account created ✓',true); setTimeout(closeAccount,500); } else { _acctMsg('Account created — check your email to confirm, then sign in.',true); } }
async function acctMagic(){ const e=document.getElementById('acctEmail').value.trim(); if(!e)return _acctMsg('Enter your email first.'); _acctMsg('Sending magic link…',true); const { error }=await sb.auth.signInWithOtp({ email:e, options:{ emailRedirectTo: location.origin+location.pathname } }); if(error)return _acctMsg(error.message); _acctMsg('Magic link sent — check your email ✉️',true); }
async function acctSignOut(){ await sb.auth.signOut(); SB_USER=null; SB_PROFILE=null; renderSidebar(); closeAccount(); }
function closeAccount(){ const m=document.getElementById('acctModal'); if(m)m.remove(); }
// Robust modal close: walk up to the fixed-position overlay and remove it (quote-safe — replaces the fragile this.closest('[style*=...]') pattern).
function modalClose(el){ let n=el; while(n){ if(n.style && n.style.position==='fixed'){ n.remove(); return; } n=n.parentElement; } }
function showAccount(){
  if(!cloudConfigured()){ alert('Cloud sync is not configured for this build.'); return; }
  closeAccount();
  const modal=document.createElement('div'); modal.id='acctModal';
  modal.style.cssText='position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;padding:20px';
  let body;
  if(cloudEnabled()){
    const slug=SB_PROFILE&&SB_PROFILE.username; const link=slug?(location.origin+location.pathname+'#twin/'+slug):'';
    body=`<div style="font-weight:800;font-size:17px;margin-bottom:6px">☁️ Account</div>
      <div style="color:var(--muted);font-size:13px;margin-bottom:12px">Signed in as <b>${escapeHtml(SB_USER.email||'')}</b>. Your progress, Twin, and notes sync automatically across devices.</div>
      ${link?`<div class="row" style="display:block;margin-bottom:10px"><span class="lbl" style="display:block;margin-bottom:4px">Your public Twin page</span><input class="keyinput" readonly value="${escapeHtml(link)}" onclick="this.select()"><div style="margin-top:6px;display:flex;gap:6px"><button class="simbtn ghost" onclick="copyToClipboard('${link}',this)">📋 Copy link</button><button class="simbtn ghost" onclick="go('twin','${slug}');closeAccount()">👁 View</button></div></div>`:''}
      <div class="row" style="margin-top:6px"><button class="simbtn" onclick="cloudPush().then(()=>_acctMsg('Synced ✓',true))">⬆ Sync now</button> <button class="simbtn ghost" onclick="showHallOfFame();closeAccount()">🏆 Hall of Fame</button> <button class="simbtn ghost" onclick="acctSignOut()">Sign out</button></div>`;
  } else {
    body=`<div style="font-weight:800;font-size:17px;margin-bottom:6px">☁️ Sync your Twin across devices</div>
      <div style="color:var(--muted);font-size:13px;margin-bottom:12px">Optional. Create a free account to back up progress, join the live Hall of Fame leaderboard, and get a shareable public Twin page. Everything keeps working offline without it.</div>
      <div class="row" style="display:block;margin-bottom:8px"><span class="lbl" style="display:block;margin-bottom:4px">Email</span><input class="keyinput" id="acctEmail" type="email" placeholder="you@example.com"></div>
      <div class="row" style="display:block;margin-bottom:10px"><span class="lbl" style="display:block;margin-bottom:4px">Password (min 6 chars)</span><input class="keyinput" id="acctPw" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')acctSignIn()"></div>
      <div class="row"><button class="simbtn" onclick="acctSignIn()">Sign in</button> <button class="simbtn ghost" onclick="acctSignUp()">Create account</button></div>
      <div style="text-align:center;color:var(--dim);font-size:11px;margin:8px 0">— or —</div>
      <div class="row"><button class="simbtn ghost" style="width:100%" onclick="acctMagic()">✉️ Email me a magic link (no password)</button></div>`;
  }
  modal.innerHTML=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;max-width:440px;width:100%;padding:20px;position:relative">
    <button onclick="closeAccount()" style="position:absolute;top:12px;right:14px;background:none;font-size:20px">×</button>
    ${body}
    <div id="acctMsg" style="font-size:12px;margin-top:10px;min-height:16px"></div>
    <div style="font-size:10px;color:var(--dim);margin-top:8px">Data is row-level-security protected — only you can read/write your own progress.</div>
  </div>`;
  modal.addEventListener('click',e=>{ if(e.target===modal) closeAccount(); });
  document.body.appendChild(modal);
}

async function loadLeaderboard(){ const el=document.getElementById('liveLeaderboard'); if(!el)return; if(!cloudConfigured()){ el.style.display='none'; return; }
  try{ const { data, error }=await sb.from('leaderboard').select('*').order('twin_progress_pct',{ascending:false}).order('power',{ascending:false}).limit(25);
    if(error||!data||!data.length){ el.innerHTML=`<div style="color:var(--dim);font-size:12px;padding:6px 0">No public Twins on the board yet — be the first! Sign in (☁️ in the sidebar) and your progress appears here automatically.</div>`; return; }
    el.innerHTML=`<table style="width:100%;border-collapse:collapse;font-size:12.5px">
      <thead><tr style="color:var(--muted);text-align:left"><th style="padding:4px 6px">#</th><th style="padding:4px 6px">Twin</th><th style="padding:4px 6px">Progress</th><th style="padding:4px 6px">Stages</th><th style="padding:4px 6px">🔥</th><th style="padding:4px 6px">⚡</th></tr></thead>
      <tbody>${data.map((r,i)=>`<tr style="border-top:1px solid var(--border2)"><td style="padding:5px 6px">${i+1}</td><td style="padding:5px 6px">${r.avatar_emoji||'🧠'} ${r.twin_slug?`<a href="#twin/${encodeURIComponent(r.twin_slug)}" onclick="closeHOF&&closeHOF()" style="color:var(--cyan)">${escapeHtml(r.display_name||'Anonymous')}</a>`:escapeHtml(r.display_name||'Anonymous')}</td><td style="padding:5px 6px">${r.twin_progress_pct}%</td><td style="padding:5px 6px">${r.stages_done}/3</td><td style="padding:5px 6px">${r.streak_days||0}d</td><td style="padding:5px 6px">${r.power||0}</td></tr>`).join('')}</tbody></table>`;
  }catch(e){ el.innerHTML=`<div style="color:var(--amber);font-size:12px">Couldn't load the live board right now.</div>`; }
}

async function renderPublicTwin(slug,c){
  c.innerHTML=`<div style="max-width:760px;margin:0 auto;padding:24px 8px"><div style="color:var(--muted)">Loading Twin…</div></div>`;
  if(!cloudConfigured()){ c.innerHTML=`<div style="max-width:760px;margin:0 auto;padding:24px 8px">Public Twin pages need cloud sync, which isn't configured for this build.</div>`; return; }

/* ================= ADHD: progress streaks + quick challenges (all in-app, localStorage) ================= */
function todayStr(){ return new Date().toISOString().slice(0,10); }
function getStreak(){
  const streak = P._streak || {count:0, last:null};
  const today = todayStr();
  if(!streak.last) return {count:0, active:false, last: null};
  const last = new Date(streak.last);
  const diff = Math.floor((new Date(today) - last) / (1000*3600*24));
  if(diff === 0) return {count: streak.count, active: true, last: streak.last};
  if(diff === 1) return {count: streak.count, active: false, last: streak.last}; // still shows current until next action
  return {count:0, active:false, last: streak.last}; // gap >1 day resets on next complete
}
function updateStreakOnComplete(){
  const s = P._streak || {count:0, last:null};
  const t = todayStr();
  if(s.last === t){
    // same day, keep count
  } else if(s.last){
    const diff = Math.floor((new Date(t) - new Date(s.last)) / (1000*3600*24));
    s.count = (diff === 1) ? s.count + 1 : 1;
  } else {
    s.count = 1;
  }
  s.last = t;
  P._streak = s; save();
}
function resetStreak(){ delete P._streak; save(); }
function getTwinPower(){
  // Pure local computation; never calls getTwinStatus or allLessons (prevents any cycle in test/jsdom load)
  try {
    const st = (typeof getStreak === 'function') ? getStreak().count : 0;
    const qcDone = Object.keys(P||{}).filter(k=>k.startsWith('qc_') && P[k] && P[k].done).length;
    // Approximate done count from known gates/stages without full lesson scan (151 total non-gate ~)
    let doneApprox = 0;
    const stageKeys = ['l3twin1','l3gate','l4twin2','l4gate','l5twin3','l5gate','l6gate'];
    stageKeys.forEach(k => { if (isDone(k)) doneApprox += 8; }); // rough weighting
    const base = Object.keys(P||{}).filter(k=>k.startsWith('l') && P[k]).length;
    const power = Math.round((doneApprox + base) * 1.0 + st * 6 + qcDone * 4 );
    return Math.min(999, Math.max(0, power));
  } catch(e){ return 0; }
}

/* ===== lazy inline YouTube players for ALL videos (100% in-app, no tabs/externals required) =====
   Click-to-load overlay (click only loads iframe). Responsive 16:9 via aspect-ratio.
   Controls=1, playsinline=1, modestbranding, rel=0. Playlists via videoseries?list= (no vid case handled).
   Full timestamp support via start= (t/start parse handles 90s/1m30s/1h2m3s).
   Titles + why notes ALWAYS kept visible inside .yt-player (above .yt-wrap, remain in fullscreen).
   Prominent in-app fullscreen button(s) call fullscreenVideo which does requestFullscreen on the .yt-player CONTAINER.
   NO primary external playback links at all (no <a> to youtube watch ever for videos; non-YT never links).
   All videos (VIDEOS[] + inline lesson.videos) go exclusively through renderVideos.
*/
function parseYouTube(urlStr){
  if(!urlStr) return {};
  try{
    const u=new URL(urlStr);
    let vid=null, list=null, start=null;
    const h=u.hostname.replace(/^www\./,'');
    if(h==='youtu.be'){
      vid=u.pathname.slice(1).split(/[?&]/)[0];
    }else if(h==='youtube.com'||h==='m.youtube.com'){
      vid=u.searchParams.get('v');
      if(!vid){
        const m=u.pathname.match(/\/(?:embed|v|shorts)\/([a-zA-Z0-9_-]{11})/);
        if(m) vid=m[1];
      }
      list=u.searchParams.get('list');
      if((u.pathname==='/playlist' || u.pathname.startsWith('/watch')) && !vid) list = list || u.searchParams.get('list');
    }
    const t=u.searchParams.get('t')||u.searchParams.get('start');
    start = parseYTStart(t);
    if(vid && vid.length>11) vid=vid.substring(0,11);
    return {vid, list, start};
  }catch(e){return{};}
}
function parseYTStart(t){
  if(!t) return null;
  const s = String(t).trim();
  if(/^\d+$/.test(s)) return parseInt(s,10);
  // support 1h2m3s / 90s / 1m30 etc
  let secs = 0;
  const hm = s.match(/(\d+)h/i); if(hm) secs += parseInt(hm[1],10)*3600;
  const mm = s.match(/(\d+)m/i); if(mm) secs += parseInt(mm[1],10)*60;
  const ss = s.match(/(\d+)s/i); if(ss) secs += parseInt(ss[1],10);
  if(secs>0) return secs;
  // last resort: strip non-digits (for plain '90')
  const n = parseInt(s.replace(/[^0-9]/g,''),10);
  return n || null;
}
function buildYTEmbed({vid,list,start}){
  // Always produces embed URL for lazy inline iframe. Supports:
  // - single vid (with optional playlist + start timestamp)
  // - playlist only via videoseries?list= (for playlist links)
  const params = ['autoplay=1','rel=0','modestbranding=1','playsinline=1','controls=1'];
  let path = '';
  if(list && !vid){
    path = 'videoseries?list=' + encodeURIComponent(list);
  }else if(vid){
    path = vid;
    if(list) params.push('list=' + encodeURIComponent(list));
  }else if(list){
    path = 'videoseries?list=' + encodeURIComponent(list);
  }else{
    return '';
  }
  if(start) params.push('start=' + start);
  const hasQ = path.includes('?');
  return 'https://www.youtube.com/embed/' + path + (hasQ ? '&' : '?') + params.join('&');
}
function loadYouTubePlayer(cid){
  const player=document.getElementById(cid);

  const vid=player.dataset.vid||'';
  const list=player.dataset.list||'';
  const start=player.dataset.start?parseInt(player.dataset.start,10):null;
  const src=buildYTEmbed({vid,list,start});
  if(!src){
    const o=wrap.querySelector('.yt-overlay'); if(o) o.remove();
    wrap.innerHTML+='<div style="padding:20px;color:#aaa;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#111">Unable to embed video</div>';
    player.dataset.loaded='1'; player.classList.add('loaded'); return;
  }
  // remove ONLY the click-to-load overlay; titles+why notes live in .yt-player (stay visible + in FS)
  const overlay = wrap.querySelector('.yt-overlay');
  if(overlay) overlay.remove();
  const ifr = document.createElement('iframe');
  ifr.src = src;
  ifr.title = 'YouTube video player';
  ifr.setAttribute('frameborder','0');
  ifr.setAttribute('allow','accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; fullscreen');
  ifr.setAttribute('allowfullscreen','');
  ifr.setAttribute('playsinline','');
  // iframe only for the 16:9 player; container FS keeps title/why
  wrap.appendChild(ifr);
  player.dataset.loaded='1';
  player.classList.add('loaded');
  // fs-float already in static render markup for pre-load FS clicks; no re-add
}
function fullscreenVideo(cid){
  const player=document.getElementById(cid);
  if(!player) return;
  if(!player.dataset.loaded) loadYouTubePlayer(cid);

/* tokenizer: crude BPE-ish splitter for intuition */
SIMS.tokenizer=function(b){
  b.innerHTML=`<input type="text" id="tkin" value="The unbelievable transformer architecture tokenizes everything!" oninput="SIMS._tok()">
  <div class="simout" id="tkout"></div><div style="font-size:12px;color:var(--dim);margin-top:8px" id="tkn"></div>`;
  SIMS._tok=function(){
    const v=document.getElementById('tkin').value;
    const parts=[];
    v.split(/(\s+)/).forEach(w=>{
      if(/^\s+$/.test(w)||w==='')return;
      if(w.length<=4){parts.push(w);return;}
      let rest=w;
      const common=['ing','tion','ed','er','es','ly','un','re','ble','ize','iz','arch','itect','ure','trans','form','token','every','thing','believ'];
      let out=[];
      while(rest.length>4){
        let cut=false;
        for(const c of common){ if(rest.toLowerCase().startsWith(c)&&rest.length-c.length>=2){out.push(rest.slice(0,c.length));rest=rest.slice(c.length);cut=true;break;} }
        if(!cut){out.push(rest.slice(0,4));rest=rest.slice(4);}
      }
      if(rest)out.push(rest);
      parts.push(...out);
    });
    const cols=['#7c6cf6','#22d3ee','#34d399','#fbbf24','#fb923c','#f87171','#a78bfa'];
    document.getElementById('tkout').innerHTML=parts.map((p,i)=>`<span class="tok" style="background:${cols[i%cols.length]}26;color:${cols[i%cols.length]};border:1px solid ${cols[i%cols.length]}44">${p}</span>`).join('');
    document.getElementById('tkn').textContent=`≈ ${parts.length} tokens (real tokenizers differ, but this is the idea: common pieces become single tokens; rare words get split)`;
  };
  SIMS._tok();
};

/* temperature sampling over toy distribution */
SIMS.temperature=function(b){
  b.innerHTML=`<p style="font-size:13.5px;color:var(--muted)">Prompt: <i>“The capital of France is”</i> — the model's raw preferences for the next token:</p>
  <div class="row"><span class="lbl">Temperature</span><input type="range" id="tmp" min="0" max="200" value="70" oninput="SIMS._temp()"><span class="val" id="tmpv">0.7</span></div>
  <div id="tmpbars"></div>
  <div class="row" style="margin-top:12px"><button class="simbtn" onclick="SIMS._tsample()">Sample next token 20×</button><span id="tsout" style="font-family:var(--mono);font-size:12.5px;color:var(--muted)"></span></div>`;
  const logits=[['Paris',8],['the',4.5],['a',4],['located',3.4],['beautiful',2.8],['Lyon',2.2]];
  SIMS._tprobs=function(){
    const t=Math.max(parseInt(document.getElementById('tmp').value)/100,0.01);
    const exps=logits.map(([w,l])=>Math.exp(l/t));
    const s=exps.reduce((a,b)=>a+b,0);
    return logits.map(([w],i)=>[w,exps[i]/s]);
  };
  SIMS._temp=function(){
    const t=parseInt(document.getElementById('tmp').value)/100;
    document.getElementById('tmpv').textContent=t.toFixed(2);
    const probs=SIMS._tprobs();
    document.getElementById('tmpbars').innerHTML=probs.map(([w,p])=>`<div class="barrow"><span class="bl">${w}</span><div class="bv" style="width:${Math.max(p*420,2)}px"></div><span class="bn">${(p*100).toFixed(1)}%</span></div>`).join('');
  };
  SIMS._tsample=function(){
    const probs=SIMS._tprobs();
    let out=[];
    for(let i=0;i<20;i++){
      let r=Math.random(),acc=0,chosen=probs[0][0];
      for(const [w,p] of probs){acc+=p;if(r<=acc){chosen=w;break;}}
      out.push(chosen);
    }
    document.getElementById('tsout').textContent=out.join(' · ');
  };
  SIMS._temp();
};

/* samplers: temperature + top-k + top-p on one toy distribution */
SIMS.samplers=function(b){
  const logits=[['Paris',8.0],['the',4.6],['a',4.1],['located',3.5],['beautiful',2.9],['Lyon',2.3],['surrounded',1.7],['definitely',1.2]];
  b.innerHTML=`<p style="font-size:13.5px;color:var(--muted)">One distribution, three controls. Prompt: <i>"The capital of France is"</i>. Watch which tokens survive each filter.</p>
  <div class="row"><span class="lbl">Temperature</span><input type="range" id="sm_t" min="0" max="200" value="70" oninput="SIMS._sm()"><span class="val" id="sm_tv">0.70</span></div>
  <div class="row"><span class="lbl">top-k (0 = off)</span><input type="range" id="sm_k" min="0" max="8" value="0" oninput="SIMS._sm()"><span class="val" id="sm_kv">off</span></div>
  <div class="row"><span class="lbl">top-p (1 = off)</span><input type="range" id="sm_p" min="10" max="100" value="100" oninput="SIMS._sm()"><span class="val" id="sm_pv">1.00</span></div>
  <div id="sm_bars"></div>
  <div class="simout" id="sm_out" style="font-size:12.5px"></div>`;
  SIMS._sm=function(){
    const t=Math.max(+document.getElementById('sm_t').value/100,0.01);
    const k=+document.getElementById('sm_k').value;
    const p=+document.getElementById('sm_p').value/100;
    document.getElementById('sm_tv').textContent=t.toFixed(2);
    document.getElementById('sm_kv').textContent=k===0?'off':k;
    document.getElementById('sm_pv').textContent=p.toFixed(2);
    // softmax with temperature
    const exps=logits.map(([w,l])=>Math.exp(l/t));
    const s=exps.reduce((a,b)=>a+b,0);
    let dist=logits.map(([w],i)=>({w,p:exps[i]/s})).sort((a,b)=>b.p-a.p);
    // top-k: keep k highest
    let kept=new Set(dist.map(d=>d.w));
    if(k>0){ kept=new Set(dist.slice(0,k).map(d=>d.w)); }
    // top-p: keep smallest set whose cumulative prob >= p
    if(p<1){ let acc=0,pk=new Set(); for(const d of dist){ if(!kept.has(d.w))continue; pk.add(d.w); acc+=d.p; if(acc>=p)break; } kept=pk; }
    // renormalize kept
    const keptSum=dist.filter(d=>kept.has(d.w)).reduce((a,d)=>a+d.p,0)||1;
    document.getElementById('sm_bars').innerHTML=dist.map(d=>{
      const alive=kept.has(d.w);
      const shown=alive?d.p/keptSum:0;
      return `<div class="barrow"><span class="bl" style="color:${alive?'var(--text)':'var(--dim)'}">${d.w}</span><div class="bv" style="width:${Math.max((alive?shown:d.p)*360,2)}px;background:${alive?'var(--accent)':'var(--bg3)'};opacity:${alive?1:.5}"></div><span class="bn">${alive?(shown*100).toFixed(1)+'%':'cut'}</span></div>`;
    }).join('');
    const n=kept.size;
    document.getElementById('sm_out').innerHTML=`<b style="color:var(--accent2)">${n}</b> of ${dist.length} tokens can be chosen. Temperature reshapes the odds; top-k caps the count; top-p caps the cumulative mass. They stack — most apps tune temperature + one of top-k/top-p.`;
  };
  SIMS._sm();
};

/* embeddings: 2D toy map + cosine */
SIMS.embedding=function(b){
  const words={king:[8,8],queen:[7.6,8.4],man:[6,5],woman:[5.6,5.4],apple:[1,2],banana:[1.4,1.6],fruit:[1.8,2.4],paris:[4,9],france:[4.5,9.3],tokyo:[3.5,8.6]};
  b.innerHTML=`<div class="row"><span class="lbl">Word A</span><select id="ea" style="background:var(--bg);color:var(--text);border:1px solid var(--border2);border-radius:7px;padding:7px">${Object.keys(words).map(w=>`<option>${w}</option>`).join('')}</select>
  <span class="lbl" style="min-width:60px">Word B</span><select id="eb" style="background:var(--bg);color:var(--text);border:1px solid var(--border2);border-radius:7px;padding:7px">${Object.keys(words).map((w,i)=>`<option ${i===1?'selected':''}>${w}</option>`).join('')}</select></div>
  <div class="simout" id="eout"></div>
  <p style="font-size:12px;color:var(--dim);margin-top:8px">Real embeddings have 1,000+ dimensions, not 2 — but the principle is identical: similar meaning ⇒ vectors point the same way ⇒ high cosine similarity.</p>`;
  const upd=()=>{
    const a=words[document.getElementById('ea').value], c=words[document.getElementById('eb').value];
    const dot=a[0]*c[0]+a[1]*c[1];
    const cos=dot/(Math.hypot(...a)*Math.hypot(...c));
    const pct=Math.max((cos-0.5)/0.5,0)*100;
    document.getElementById('eout').innerHTML=`Vector A = [${a}]   Vector B = [${c}]<br>Cosine similarity = <b style="color:var(--accent2)">${cos.toFixed(3)}</b>
    <div class="bar" style="margin-top:8px"><i style="width:${pct}%"></i></div>
    <div style="margin-top:6px;font-size:13px;color:${cos>0.97?'var(--green)':cos>0.9?'var(--amber)':'var(--red)'}">${cos>0.97?'Very similar meaning':cos>0.9?'Somewhat related':'Different concepts'}</div>`;
  };
  document.getElementById('ea').onchange=upd; document.getElementById('eb').onchange=upd; upd();
};

/* chunking */
SIMS.chunking=function(b){
  const text="AI engineering is the discipline of building applications on top of foundation models. Unlike classical machine learning, you usually start from a model someone else trained. Your job is to adapt it: with prompts, with retrieved context, or with fine-tuning. Evaluation is the hardest part of the job. Without reliable evaluation, you cannot tell whether any change made your system better or worse. Retrieval-augmented generation grounds the model in your own documents. It splits documents into chunks, embeds them, and retrieves the most relevant ones at question time.";
  b.innerHTML=`<div class="row"><span class="lbl">Chunk size (chars)</span><input type="range" id="cs" min="40" max="300" value="120" oninput="SIMS._chunk()"><span class="val" id="csv">120</span></div><div class="simout" id="cout"></div>`;
  SIMS._chunk=function(){
    const n=parseInt(document.getElementById('cs').value);
    document.getElementById('csv').textContent=n;
    const cols=['#7c6cf6','#22d3ee','#34d399','#fbbf24','#fb923c','#f87171'];
    let chunks=[],i=0;
    while(i<text.length){
      let end=Math.min(i+n,text.length);
      if(end<text.length){const sp=text.lastIndexOf(' ',end); if(sp>i)end=sp;}
      chunks.push(text.slice(i,end)); i=end+1;
    }
    document.getElementById('cout').innerHTML=chunks.map((c,ci)=>`<span style="background:${cols[ci%cols.length]}1f;border-bottom:2px solid ${cols[ci%cols.length]};padding:1px 2px">${c}</span>`).join(' ')+`<div style="margin-top:10px;font-size:12.5px;color:var(--dim)">${chunks.length} chunks. Small chunks = precise retrieval but lost context. Big chunks = more context but diluted relevance.</div>`;
  };
  SIMS._chunk();
};

/* cost calculator */
SIMS.costcalc=function(b){
  b.innerHTML=`<div class="row"><span class="lbl">Requests / day</span><input type="range" id="cc1" min="1" max="1000" value="100" oninput="SIMS._cc()"><span class="val" id="cc1v"></span></div>
  <div class="row"><span class="lbl">Input tokens / request</span><input type="range" id="cc2" min="100" max="20000" step="100" value="2000" oninput="SIMS._cc()"><span class="val" id="cc2v"></span></div>
  <div class="row"><span class="lbl">Output tokens / request</span><input type="range" id="cc3" min="50" max="4000" step="50" value="500" oninput="SIMS._cc()"><span class="val" id="cc3v"></span></div>
  <div class="row"><span class="lbl">Model tier</span><select id="cc4" onchange="SIMS._cc()" style="background:var(--bg);color:var(--text);border:1px solid var(--border2);border-radius:7px;padding:7px"><option value="0.15,0.6">Small (e.g. gpt-4o-mini class)</option><option value="2.5,10">Frontier (e.g. gpt-4o class)</option><option value="15,60">Premium reasoning class</option></select></div>
  <div class="simout" id="ccout"></div>`;
  SIMS._cc=function(){
    const r=+document.getElementById('cc1').value, ti=+document.getElementById('cc2').value, to=+document.getElementById('cc3').value;

    document.getElementById('cc1v').textContent=r; document.getElementById('cc2v').textContent=ti; document.getElementById('cc3v').textContent=to;
    const day=(r*ti/1e6*pi)+(r*to/1e6*po);
    document.getElementById('ccout').innerHTML=`Daily: <b style="color:var(--accent2)">$${day.toFixed(2)}</b> · Monthly: <b style="color:${day*30>1000?'var(--red)':day*30>100?'var(--amber)':'var(--green)'}">$${(day*30).toFixed(2)}</b><div style="font-size:12.5px;color:var(--dim);margin-top:6px">Notice: input tokens usually dominate cost in RAG apps (long contexts), and a frontier model is ~17× the price of a small one. Model choice is a cost decision.</div>`;
  };
  SIMS._cc();
};

/* context window */
SIMS.context=function(b){
  b.innerHTML=`<div class="row"><span class="lbl">Conversation length (messages)</span><input type="range" id="cw" min="2" max="60" value="10" oninput="SIMS._cw()"><span class="val" id="cwv"></span></div><div class="simout" id="cwout"></div>`;
  SIMS._cw=function(){
    const n=+document.getElementById('cw').value;
    document.getElementById('cwv').textContent=n;
    const tokens=n*350, win=8000;
    const over=tokens>win;
    let html=`<div style="font-size:13px">≈ ${tokens.toLocaleString()} tokens of history · window = ${win.toLocaleString()} tokens</div><div class="bar" style="margin-top:8px;height:14px"><i style="width:${Math.min(tokens/win*100,100)}%;background:${over?'var(--red)':'var(--accent)'}"></i></div>`;
    html+=`<div style="margin-top:8px;font-size:12.5px;color:${over?'var(--red)':'var(--dim)'}">${over?`Overflow! The oldest ${Math.ceil((tokens-win)/350)} messages get cut off — the model literally cannot see them anymore. This is why chatbots "forget".`:'Everything still fits — the model can see the whole conversation.'}</div>`;
    document.getElementById('cwout').innerHTML=html;
  };
  SIMS._cw();
};

/* quantization */
SIMS.quant=function(b){
  b.innerHTML=`<div class="row"><span class="lbl">Precision</span><select id="qp" onchange="SIMS._q()" style="background:var(--bg);color:var(--text);border:1px solid var(--border2);border-radius:7px;padding:7px">
  <option value="16">FP16 — 16 bits/weight</option><option value="8">INT8 — 8 bits/weight</option><option value="4" selected>INT4 — 4 bits/weight</option><option value="2">2-bit (extreme)</option></select>
  <span class="lbl" style="min-width:80px">Model size</span><select id="qm" onchange="SIMS._q()" style="background:var(--bg);color:var(--text);border:1px solid var(--border2);border-radius:7px;padding:7px"><option value="7">7B params</option><option value="70">70B params</option><option value="405">405B params</option></select></div>
  <div class="simout" id="qout"></div>`;
  SIMS._q=function(){
    const bits=+document.getElementById('qp').value, p=+document.getElementById('qm').value;
    const gb=p*bits/8;
    const qual={16:'~100% (reference quality)',8:'~99% — nearly free win',4:'~97-98% — the sweet spot for most uses',2:'~80-90% — noticeable damage, niche only'}[bits];
    const fits=gb<=24?'fits on one consumer GPU (24 GB)':gb<=80?'needs one datacenter GPU (80 GB)':`needs ${Math.ceil(gb/80)} × 80 GB GPUs`;
    document.getElementById('qout').innerHTML=`Memory for weights: <b style="color:var(--accent2)">${gb.toFixed(1)} GB</b> → ${fits}<br>Typical quality retained: <b style="color:${bits>=4?'var(--green)':'var(--red)'}">${qual}</b><div style="font-size:12.5px;color:var(--dim);margin-top:6px">Lower precision also means fewer bytes to move from memory → faster decoding, since LLM decoding is memory-bandwidth-bound.</div>`;
  };
  SIMS._q();
};

/* batching */
SIMS.batching=function(b){
  b.innerHTML=`<div class="row"><span class="lbl">Batch size</span><input type="range" id="bs" min="1" max="64" value="8" oninput="SIMS._b()"><span class="val" id="bsv"></span></div><div class="simout" id="bout"></div>`;
  SIMS._b=function(){
    const n=+document.getElementById('bs').value;
    document.getElementById('bsv').textContent=n;
    const thr=Math.round(40*n/(1+n*0.02));
    const lat=Math.round(25*(1+n*0.02));
    document.getElementById('bout').innerHTML=
    `<div class="barrow"><span class="bl">Throughput</span><div class="bv" style="width:${thr/2200*420}px;background:var(--green)"></div><span class="bn">${thr.toLocaleString()} tok/s total</span></div>
    <div class="barrow"><span class="bl">Per-token latency</span><div class="bv" style="width:${lat*4}px;background:var(--amber)"></div><span class="bn">${lat} ms/token per user</span></div>
    <div style="margin-top:8px;font-size:12.5px;color:var(--dim)">Batching reuses one weight-load from memory across many users — throughput scales almost linearly while each user's latency degrades only slightly. This is THE core economics of inference serving.</div>`;
  };
  SIMS._b();
};

/* KV cache */
SIMS.kvcache=function(b){
  b.innerHTML=`<div class="row"><span class="lbl">Tokens generated so far</span><input type="range" id="kv" min="10" max="2000" value="300" oninput="SIMS._kv()"><span class="val" id="kvv"></span></div><div class="simout" id="kvout"></div>`;
  SIMS._kv=function(){
    const n=+document.getElementById('kv').value;
    document.getElementById('kvv').textContent=n;
    const naive=n*(n+1)/2, cached=n;
    document.getElementById('kvout').innerHTML=
    `<div class="barrow"><span class="bl">Without KV cache</span><div class="bv" style="width:${Math.min(naive/2001000*420,420)}px;background:var(--red)"></div><span class="bn">${naive.toLocaleString()} token-computations</span></div>
    <div class="barrow"><span class="bl">With KV cache</span><div class="bv" style="width:${Math.max(cached/2001000*420,2)}px;background:var(--green)"></div><span class="bn">${cached.toLocaleString()}</span></div>
    <div style="margin-top:8px;font-size:12.5px;color:var(--dim)">Without caching, every new token would recompute attention over ALL previous tokens from scratch (quadratic). The KV cache stores past keys/values so each new token costs one step. Price: the cache eats GPU memory — and managing that memory is half of inference engineering.</div>`;
  };
  SIMS._kv();
};

/* speculative decoding */
SIMS.speculative=function(b){
  b.innerHTML=`<div class="row"><span class="lbl">Draft acceptance rate</span><input type="range" id="sp" min="10" max="95" value="70" oninput="SIMS._sp()"><span class="val" id="spv"></span></div><div class="simout" id="spout"></div>`;
  SIMS._sp=function(){
    const a=+document.getElementById('sp').value/100;
    document.getElementById('spv').textContent=Math.round(a*100)+'%';
    const k=4;
    const accepted=(1-Math.pow(a,k+1))/(1-a);
    const speed=accepted/(1+k*0.15);
    document.getElementById('spout').innerHTML=`Drafting ${k} tokens per round with a small model, verifying with the big one:<br>Expected tokens accepted per big-model pass: <b style="color:var(--accent2)">${accepted.toFixed(2)}</b><br>Effective speedup: <b style="color:${speed>1.3?'var(--green)':'var(--amber)'}">${speed.toFixed(2)}×</b><div style="font-size:12.5px;color:var(--dim);margin-top:6px">When the draft model guesses well (predictable text, code), speculation flies. When acceptance drops, you pay for drafting and get nothing — speculation can even slow you down.</div>`;
  };
  SIMS._sp();
};

/* attention toy */
SIMS.attention=function(b){
  const sent=['The','cat','sat','on','the','mat','because','it','was','soft'];
  const att={7:[[1,0.62],[5,0.23],[9,0.08]],9:[[5,0.55],[1,0.2],[8,0.1]],2:[[1,0.7],[0,0.15]]};
  b.innerHTML=`<p style="font-size:13px;color:var(--muted)">Click a word to see what it "attends to" (toy weights):</p><div id="atw" style="line-height:2.4"></div><div class="simout" id="atout">Click <b>it</b> — what does the model think "it" refers to?</div>`;
  const draw=(sel)=>{
    document.getElementById('atw').innerHTML=sent.map((w,i)=>{
      let bg='var(--bg3)',col='var(--muted)';
      if(i===sel){bg='var(--accent)';col='#fff';}
      else if(sel!==undefined&&att[sel]){const f=att[sel].find(x=>x[0]===i); if(f){bg=`rgba(34,211,238,${f[1]})`;col='#fff';}}
      return `<span class="tok" style="background:${bg};color:${col};cursor:pointer;padding:4px 10px" onclick="SIMS._at(${i})">${w}</span>`;
    }).join('');
  };
  SIMS._at=function(i){
    draw(i);
    const a=att[i];
    document.getElementById('atout').innerHTML=a?`<b>"${sent[i]}"</b> attends most to: ${a.map(([j,w])=>`<b style="color:var(--cyan)">${sent[j]}</b> (${Math.round(w*100)}%)`).join(', ')} — attention is how the model resolves references and relationships between tokens.`:`<b>"${sent[i]}"</b> — this toy demo only has interesting weights for <b>it</b>, <b>sat</b> and <b>soft</b>. Try those!`;
  };
  draw();
};

async function saveKey(){
  const k=document.getElementById('keyin').value.trim();
  const base=(document.getElementById('baseinput')||{}).value;
  const cm=(document.getElementById('chatmodelinput')||{}).value;
  const em=(document.getElementById('embedmodelinput')||{}).value;
  if(base&&base.trim()) localStorage.setItem('z2ai_base',base.trim()); else localStorage.removeItem('z2ai_base');
  if(cm&&cm.trim()) localStorage.setItem('z2ai_chatmodel',cm.trim()); else localStorage.removeItem('z2ai_chatmodel');
  if(em&&em.trim()) localStorage.setItem('z2ai_embedmodel',em.trim()); else localStorage.removeItem('z2ai_embedmodel');
  const out=document.getElementById('keyout');
  if(!k){out.textContent='Paste a key first (any non-empty value for a local server).';return;}
  localStorage.setItem('z2ai_key',k);
  out.textContent='Testing a live call against '+providerHost()+' …';
  try{
    const r=await llm([{role:'user',content:'Reply with exactly: OK'}],{max_tokens:5});
    out.innerHTML='<span style="color:var(--green)">✓ Works! '+escapeHtml(getChatModel())+' replied: "'+escapeHtml(r.text.trim())+'" — live labs unlocked via '+escapeHtml(providerHost())+'.</span>';
  }catch(e){ out.innerHTML='<span style="color:var(--red)">✗ '+escapeHtml(e.message)+'</span><br><span style="color:var(--amber);font-size:12px">If using a local server, check the server is running and the base URL ends in /v1. Browser CORS may also block it — some local servers need a flag to allow browser requests.</span>'; }
  renderSidebar();
}
async function llm(messages,opts={}){
  const k=getKey(); if(!k) throw new Error('No API key set — add one under 🔑 API key in the sidebar.');
  const body={model:opts.model||getChatModel(),messages,temperature:opts.temperature??0.7};
  if(opts.max_tokens)body.max_tokens=opts.max_tokens;
  if(opts.response_format)body.response_format=opts.response_format;
  const res=await fetch(getBase()+'/chat/completions',{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+k},
    body:JSON.stringify(body)});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error('API error '+res.status+': '+(e.error&&e.error.message||res.statusText));}
  const j=await res.json();
  return {text:j.choices[0].message.content,usage:j.usage};
}
function costOf(usage,model){
  const p=model==='gpt-4o'?[2.5,10]:[0.15,0.6];
  return (usage.prompt_tokens*p[0]+usage.completion_tokens*p[1])/1e6;
}
async function embedText(texts,opts={}){
  const k=getKey(); if(!k) throw new Error('No API key set — add one under 🔑 API key in the sidebar.');
  const res=await fetch(getBase()+'/embeddings',{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+k},
    body:JSON.stringify({model:opts.model||getEmbedModel(),input:texts})});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error('API error '+res.status+': '+(e.error&&e.error.message||res.statusText));}
  const j=await res.json();
  return {vectors:j.data.map(d=>d.embedding),usage:j.usage};
}
function cosineSim(a,b){
  let dot=0,na=0,nb=0;
  for(let i=0;i<a.length;i++){ dot+=a[i]*b[i]; na+=a[i]*a[i]; nb+=b[i]*b[i]; }
  return dot/(Math.sqrt(na)*Math.sqrt(nb)||1);
}

/* ================= streaming LLM call ================= */
function parseSSE(buf){
  // pure: split an SSE text buffer into complete data events + leftover
  const lines=buf.split('\n'); const rest=lines.pop();
  const events=[];
  for(const line of lines){
    const m=line.match(/^data: ?(.*)$/);
    if(m && m[1]!=='[DONE]') events.push(m[1]);
  }
  return {events, rest};
}
async function llmStream(messages,opts={},onToken){
  const k=getKey(); if(!k) throw new Error('No API key set — add one under 🔑 API key in the sidebar.');
  const body={model:opts.model||getChatModel(),messages,temperature:opts.temperature??0.7,stream:true,stream_options:{include_usage:true}};
  if(opts.max_tokens)body.max_tokens=opts.max_tokens;
  const res=await fetch(getBase()+'/chat/completions',{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+k},
    body:JSON.stringify(body)});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error('API error '+res.status+': '+(e.error&&e.error.message||res.statusText));}
  const reader=res.body.getReader(); const dec=new TextDecoder();
  let buf='', full='', usage=null;
  while(true){
    const {done,value}=await reader.read(); if(done)break;
    buf+=dec.decode(value,{stream:true});
    const {events,rest}=parseSSE(buf); buf=rest;
    for(const ev of events){
      try{
        const j=JSON.parse(ev);
        const d=j.choices&&j.choices[0]&&j.choices[0].delta&&j.choices[0].delta.content;
        if(d){ full+=d; if(onToken)onToken(d,full); }
        if(j.usage)usage=j.usage;
      }catch(e){}
    }
  }
  return {text:full,usage};
}

/* ================= pure validation helpers (unit-tested) ================= */
function extractJson(text){
  const m=text.match(/```(?:json)?\s*([\s\S]*?)```/);
  let t=(m?m[1]:text).trim();
  // tolerate prose around a single JSON object/array
  if(!/^[\[{]/.test(t)){ const s=t.search(/[\[{]/); if(s>=0){ const e=Math.max(t.lastIndexOf('}'),t.lastIndexOf(']')); if(e>s) t=t.slice(s,e+1); } }
  return t;
}
function liveCheck(chk,text){
  let parsed=null;
  if(chk.mustParse==='json'){
    try{ parsed=JSON.parse(extractJson(text)); }
    catch(e){ return {ok:false,why:'The response is not valid JSON. ('+e.message+')',parsed:null}; }
    if(chk.schemaKeys){ for(const key of chk.schemaKeys){ if(parsed===null||typeof parsed!=='object'||!(key in parsed)) return {ok:false,why:'The JSON is missing the required key "'+key+'".',parsed}; } }
  }
  if(chk.mustInclude){ for(const s of chk.mustInclude){ if(!text.toLowerCase().includes(String(s).toLowerCase())) return {ok:false,why:'The response must include: "'+s+'"',parsed}; } }
  if(chk.notInclude){ for(const s of chk.notInclude){ if(text.toLowerCase().includes(String(s).toLowerCase())) return {ok:false,why:'The response must NOT include: "'+s+'"',parsed}; } }
  if(chk.mustRegex&&!new RegExp(chk.mustRegex,'im').test(text)) return {ok:false,why:chk.failMsg||'The response does not match the required pattern yet.',parsed};
  if(chk.maxChars&&text.length>chk.maxChars) return {ok:false,why:'The response is too long ('+text.length+' chars, max '+chk.maxChars+'). Tighten your prompt.',parsed};
  return {ok:true,why:'',parsed};
}
function judgeMessages(rubric,response){
  return [
    {role:'system',content:'You are a strict grader. Grade the RESPONSE against the RUBRIC. Reply with ONLY a JSON object: {"pass": true|false, "reason": "one short sentence"}.'},
    {role:'user',content:'RUBRIC:\n'+rubric+'\n\nRESPONSE:\n'+response}
  ];
}
function judgeParse(text){
  try{ const j=JSON.parse(extractJson(text)); return {pass:j.pass===true,reason:String(j.reason||'')}; }
  catch(e){ return {pass:false,reason:'Judge reply was not valid JSON: '+text.slice(0,120)}; }
}
function applyTemplate(tpl,input){ return tpl.replace(/\{\{\s*input\s*\}\}/g,input); }
function evalMatch(expected,output,mode){
  const norm=s=>String(s).trim().toLowerCase().replace(/[.!?\s]+$/,'');
  if(mode==='includes') return norm(output).includes(norm(expected));
  if(mode==='regex') return new RegExp(expected,'i').test(output);
  return norm(output)===norm(expected);
}
function normalizeBaseUrl(u){
  u=String(u).trim().replace(/\/+$/,'');
  if(u&&!/^https?:\/\//i.test(u)) u='https://'+u;
  return u;
}
function deployCheckHealth(j){ return !!(j&&String(j.status).toLowerCase()==='ok'); }
function deployCheckAsk(j){ return !!(j&&typeof j.answer==='string'&&j.answer.length>0&&('sources' in j)); }
function colabParseScores(text,spec){
  let j;
  try{ j=JSON.parse(extractJson(text)); }
  catch(e){ return {ok:false,why:'That is not valid JSON. Copy the eval cell output exactly.',scores:null}; }
  for(const key of (spec.jsonKeys||[])){ if(!(key in j)) return {ok:false,why:'Missing key "'+key+'" — paste the full eval output.',scores:j}; }
  for(const key in (spec.plausible||{})){
    const v=Number(j[key]), [lo,hi]=spec.plausible[key];
    if(!(v>=lo&&v<=hi)) return {ok:false,why:'Value for "'+key+'" ('+j[key]+') is outside the plausible range ['+lo+', '+hi+']. Re-run the eval cell and paste its real output.',scores:j};
  }
  return {ok:true,why:'',scores:j};
}

function initColabEx(l){ curColab=l; }
async function runColab(){
  const l=curColab, cb=l.colab, out=document.getElementById('cbout'), btn=document.getElementById('cbbtn');
  const input=document.getElementById('cbin').value.trim();
  out.style.display='block';
  if(!input){ out.textContent='Paste something first.'; return; }
  btn.disabled=true;
  try{
    if(cb.verify==='model'){
      if(!looksLikeFinetuneId(input)){ out.innerHTML='<span style="color:var(--red)">That does not look like a fine-tuned model ID — it should start with <code>ft:</code>. Find it on the fine-tuning job page.</span>'; btn.disabled=false; return; }
      if(!getKey()){ out.innerHTML=keyGate('verification'); btn.disabled=false; return; }
      let allOk=true, lines=[];
      for(const t of cb.tests){
        out.innerHTML='Calling <code>'+escapeHtml(input)+'</code> live…<br>'+lines.join('<br>');
        const r=await llm([{role:'user',content:t.prompt}],{model:input,temperature:0,max_tokens:t.maxTokens||80});
        const res=liveCheck(t.check,r.text);
        if(!res.ok)allOk=false;
        lines.push(`${res.ok?'<span style="color:var(--green)">✓</span>':'<span style="color:var(--red)">✗</span>'} <b>${escapeHtml(t.prompt.slice(0,60))}</b> → ${escapeHtml(r.text.trim().slice(0,80))}${res.ok?'':' <span style="color:var(--red)">('+escapeHtml(res.why)+')</span>'}`);
      }
      out.innerHTML=lines.join('<br>');
      if(allOk){
        out.innerHTML+='<br><span style="color:var(--green)">✓ Your fine-tuned model passes the behavior check — verified!</span>';
        P[l.id+'_proof']={summary:input,at:new Date().toISOString().slice(0,10)};
        exComplete(l,'cbhead','verified');
      }else out.innerHTML+='<br><span style="color:var(--amber)">The model answered, but not with the trained behavior. Check the right model ID, or train longer / check your dataset.</span>';
    }else{
      const res=colabParseScores(input,cb);
      if(res.ok){
        out.innerHTML='<span style="color:var(--green)">✓ Scores accepted: <code>'+escapeHtml(JSON.stringify(res.scores))+'</code></span>';
        P[l.id+'_proof']={summary:JSON.stringify(res.scores),at:new Date().toISOString().slice(0,10)};
        exComplete(l,'cbhead','verified');
      }else out.innerHTML='<span style="color:var(--red)">✗ '+escapeHtml(res.why)+'</span>';
    }
  }catch(e){ out.innerHTML='<span style="color:var(--red)">'+escapeHtml(e.message)+'</span>'; }
  btn.disabled=false;
}

async function runDeploy(){
  const l=curDeploy, out=document.getElementById('dpout'), btn=document.getElementById('dpbtn');
  const base=normalizeBaseUrl(document.getElementById('dpin').value);
  out.style.display='block';
  if(!base){ out.textContent='Paste your deployed URL first.'; return; }
  btn.disabled=true;
  try{
    out.innerHTML='1/2 — GET <code>'+escapeHtml(base)+'/health</code> …';
